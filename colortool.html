<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Viewer</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  textarea { width: 100%; height: 150px; }
  .controls { margin: 10px 0; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .color-box {
    width: 50px;
    height: 50px;
    border: 1px solid #00000020;
  }
</style>
</head>
<body>

<h2>Paste your color XML</h2>
<textarea id="input"></textarea>

<div class="controls">
  <button onclick="parseColors()">Load</button>
  <button onclick="sortHue()">Sort by Hue</button>
  <button onclick="adjustSaturation(0.05)">Sat +5%</button>
  <button onclick="adjustSaturation(-0.05)">Sat -5%</button>
  <button onclick="adjustBrightness(0.05)">Bright +5%</button>
  <button onclick="adjustBrightness(-0.05)">Bright -5%</button>
  <button onclick="exportXML()">Export XML</button>
</div>

<textarea id="output" placeholder="Exported XML will appear here..."></textarea>

<div id="colors" class="color-grid"></div>

<script src="colortool.js"></script>

</body>
</html>
