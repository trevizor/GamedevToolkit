          const i1 = indices[i];
          const i2 = indices[(i + 1) % indices.length];

          const a = poly[i0];
          const b = poly[i1];
          const c = poly[i2];

          const ab = { x: b.x - a.x, z: b.z - a.z };
          const ac = { x: c.x - a.x, z: c.z - a.z };
          const cross = ab.x * ac.z - ab.z * ac.x;
          if (cross <= 1e-10) {
            continue;
          }

          let hasInside = false;
          for (let j = 0; j < indices.length; j += 1) {
            const ip = indices[j];
            if (ip === i0 || ip === i1 || ip === i2) {
              continue;
            }
            if (pointInTriangle2D(poly[ip], a, b, c)) {
              hasInside = true;
              break;
            }
          }

          if (hasInside) {
            continue;
          }

          tris.push([poly[i0], poly[i1], poly[i2]]);
          indices.splice(i, 1);
          earFound = true;
          break;
        }

        if (!earFound) {
          break;
        }
      }

      return tris;
    }

    function getSegmentTypePriority(type) {
      if (type === "door") {
        return 50;
      }
      if (type === "window") {
        return 40;
      }
      if (type === "halfwall") {
        return 30;
      }
      if (type === "fakewall") {
        return 5;
      }
      return 10; // default wall (least important among visible geometry lines)
    }

    function resolveOverlappingSegmentsForMesh(sourceSegments) {
      const eps = 1e-6;
      const candidates = [];

      function addUniqueT(list, t) {
        const clamped = Math.max(0, Math.min(1, t));
        for (let i = 0; i < list.length; i += 1) {
          if (Math.abs(list[i] - clamped) <= eps) {
            return;
          }
        }
        list.push(clamped);
      }

      function lerp2(a, b, t) {
        return {
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t
        };
      }

      for (let i = 0; i < sourceSegments.length; i += 1) {
        const raw = sourceSegments[i];
        if (!raw || !raw.a || !raw.b) {
          continue;
        }

        const a = { x: Number(raw.a.x), y: Number(raw.a.y) };
        const b = { x: Number(raw.b.x), y: Number(raw.b.y) };
        if (![a.x, a.y, b.x, b.y].every(Number.isFinite)) {
          continue;
        }

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.hypot(dx, dy);
        if (len <= eps) {
          continue;
        }

        const type = raw.type || "wall";
        candidates.push({
          a,
          b,
          type,
          priority: getSegmentTypePriority(type),
          len,
          dir: { x: dx / len, y: dy / len },
          splitT: [0, 1]
        });
      }

      for (let i = 0; i < candidates.length; i += 1) {
        for (let j = i + 1; j < candidates.length; j += 1) {
          const s0 = candidates[i];
          const s1 = candidates[j];

          // Matching direction only.
          const dot = s0.dir.x * s1.dir.x + s0.dir.y * s1.dir.y;
          if (dot < 0.999) {
            continue;
          }

          // Must be collinear.
          const v0x = s1.a.x - s0.a.x;
          const v0y = s1.a.y - s0.a.y;
          const v1x = s1.b.x - s0.a.x;
          const v1y = s1.b.y - s0.a.y;
          const cross0 = Math.abs(v0x * s0.dir.y - v0y * s0.dir.x);
          const cross1 = Math.abs(v1x * s0.dir.y - v1y * s0.dir.x);
          if (cross0 > eps || cross1 > eps) {
            continue;
          }

          const projS1AOnS0 = ((s1.a.x - s0.a.x) * s0.dir.x + (s1.a.y - s0.a.y) * s0.dir.y) / s0.len;
          const projS1BOnS0 = ((s1.b.x - s0.a.x) * s0.dir.x + (s1.b.y - s0.a.y) * s0.dir.y) / s0.len;
          const overlapMin0 = Math.max(0, Math.min(projS1AOnS0, projS1BOnS0));
          const overlapMax0 = Math.min(1, Math.max(projS1AOnS0, projS1BOnS0));

          const projS0AOnS1 = ((s0.a.x - s1.a.x) * s1.dir.x + (s0.a.y - s1.a.y) * s1.dir.y) / s1.len;
          const projS0BOnS1 = ((s0.b.x - s1.a.x) * s1.dir.x + (s0.b.y - s1.a.y) * s1.dir.y) / s1.len;
          const overlapMin1 = Math.max(0, Math.min(projS0AOnS1, projS0BOnS1));
          const overlapMax1 = Math.min(1, Math.max(projS0AOnS1, projS0BOnS1));

          if (overlapMax0 - overlapMin0 <= eps || overlapMax1 - overlapMin1 <= eps) {
            continue;
          }

          addUniqueT(s0.splitT, overlapMin0);
          addUniqueT(s0.splitT, overlapMax0);
          addUniqueT(s1.splitT, overlapMin1);
          addUniqueT(s1.splitT, overlapMax1);
        }
      }

      const pieces = [];
      for (let i = 0; i < candidates.length; i += 1) {
        const seg = candidates[i];
        const ts = seg.splitT.slice().sort((a, b) => a - b);

        for (let k = 0; k < ts.length - 1; k += 1) {
          const t0 = ts[k];
          const t1 = ts[k + 1];
          if (t1 - t0 <= eps) {
            continue;
          }

          const a = lerp2(seg.a, seg.b, t0);
          const b = lerp2(seg.a, seg.b, t1);
          const len = Math.hypot(b.x - a.x, b.y - a.y);
          if (len <= eps) {
            continue;
          }

          pieces.push({
            a,
            b,
            len,
            type: seg.type,
            priority: seg.priority
          });
        }
      }

      function directedPieceKey(piece) {
        return `${piece.a.x.toFixed(6)},${piece.a.y.toFixed(6)}>${piece.b.x.toFixed(6)},${piece.b.y.toFixed(6)}`;
      }

      const bestByKey = new Map();
      for (let i = 0; i < pieces.length; i += 1) {
        const piece = pieces[i];
        const key = directedPieceKey(piece);
        const existing = bestByKey.get(key);
        if (!existing || piece.priority > existing.priority) {
          bestByKey.set(key, piece);
        }
      }

      const resolved = [];
      for (const piece of bestByKey.values()) {
        resolved.push({
          a: { x: piece.a.x, y: piece.a.y },
          b: { x: piece.b.x, y: piece.b.y },
          type: piece.type
        });
      }

      return resolved;
    }

    function buildCornerMaskExtensions(sourceSegments, extensionAmount) {
      const junctions = new Map();
      const extensions = new Map();
      const angleEps = 1e-4;
      const amount = Number.isFinite(extensionAmount) ? Math.max(0, extensionAmount) : 0;

      if (amount <= 0) {
        return extensions;
      }

      function pointKey2D(p) {
        return `${p.x.toFixed(6)},${p.z.toFixed(6)}`;
      }

      function addAtJunction(point, entry) {
        const key = pointKey2D(point);
        if (!junctions.has(key)) {
          junctions.set(key, []);
        }
        junctions.get(key).push(entry);
      }

      for (let i = 0; i < sourceSegments.length; i += 1) {
        const seg = sourceSegments[i];
        if (!seg || !seg.a || !seg.b || (seg.type || "wall") !== "wall") {
          continue;
        }

        const a = { x: Number(seg.a.x) * GRID_SIZE_UNITS, z: Number(seg.a.y) * GRID_SIZE_UNITS };
        const b = { x: Number(seg.b.x) * GRID_SIZE_UNITS, z: Number(seg.b.y) * GRID_SIZE_UNITS };
        if (![a.x, a.z, b.x, b.z].every(Number.isFinite)) {
          continue;
        }

        const ab = vec2Sub(b, a);
        const len = vec2Length(ab);
        if (len <= 1e-8) {
          continue;
        }

        const dirAB = vec2Scale(ab, 1 / len);
        const dirBA = vec2Scale(dirAB, -1);
        addAtJunction(a, { segIndex: i, endpoint: "a", outward: dirBA });
        addAtJunction(b, { segIndex: i, endpoint: "b", outward: dirAB });
      }

      for (const entries of junctions.values()) {
        if (!entries || entries.length !== 2) {
          continue;
        }

        const e0 = entries[0];
        const e1 = entries[1];
        if (e0.segIndex === e1.segIndex) {
          continue;
        }

        const dot = vec2Dot(e0.outward, e1.outward);
        const cross = lineCross2(e0.outward, e1.outward);
        if (Math.abs(cross) <= angleEps || Math.abs(Math.abs(dot) - 1) <= angleEps) {
          continue;
        }

        // Deterministic pick: extend the lower-index wall segment at this corner.
        const chosen = e0.segIndex <= e1.segIndex ? e0 : e1;
        if (!extensions.has(chosen.segIndex)) {
          extensions.set(chosen.segIndex, { a: 0, b: 0 });
        }
        const ex = extensions.get(chosen.segIndex);
        ex[chosen.endpoint] = Math.max(ex[chosen.endpoint], amount);
      }

      return extensions;
    }

    function buildWallMeshData(sourceSegments, levelBaseY, meshName) {
      const mesh = { name: meshName || "FloorPlanWalls", vertices: [], faces: [], faceGroups: [] };
      if (!Array.isArray(sourceSegments) || sourceSegments.length === 0) {
        return mesh;
      }
      levelBaseY = Number.isFinite(levelBaseY) ? levelBaseY : 0;

      const resolvedSegments = resolveOverlappingSegmentsForMesh(sourceSegments);
      if (resolvedSegments.length === 0) {
        return mesh;
      }

      const thickness = getWallThickness();
      const height = getWallHeight();
      const doorHeadHeight = getDoorHeadHeight();
      const windowOpeningGap = getWindowOpeningGap();
      const half = thickness / 2;
      const cornerMaskExtensions = buildCornerMaskExtensions(resolvedSegments, half);

      const vertexMap = new Map();

      function getVertexIndex(v) {
        const key = vertexKey(v);
        if (vertexMap.has(key)) {
          return vertexMap.get(key);
        }
        const index = mesh.vertices.length;
        mesh.vertices.push(v);
        vertexMap.set(key, index);
        return index;
      }

      function addFace(face, group) {
        mesh.faces.push(face);
        mesh.faceGroups.push(group);
      }

      function addOrientedQuadGrouped(a, b, c, d, desiredNormal, group) {
        const ab = sub3(b, a);
        const ac = sub3(c, a);
        const n = cross3(ab, ac);
        const flip = dot3(n, desiredNormal) < 0;

        const i0 = getVertexIndex(a);
        const i1 = getVertexIndex(b);
        const i2 = getVertexIndex(c);
        const i3 = getVertexIndex(d);

        if (flip) {
          addFace([i0, i2, i1], group);
          addFace([i0, i3, i2], group);
        } else {
          addFace([i0, i1, i2], group);
          addFace([i0, i2, i3], group);
        }
      }

      function addOrientedQuad(a, b, c, d, desiredNormal) {
        addOrientedQuadGrouped(a, b, c, d, desiredNormal, "walls");
      }

      function addSegmentPrism(a, b, baseY, topY) {
        if (topY - baseY <= 1e-6) {
          return;
        }

        const delta = vec2Sub(b, a);
        const len = vec2Length(delta);
        if (len <= 1e-8) {
          return;
        }
        const dir = vec2Scale(delta, 1 / len);
        const left = vec2PerpLeft(dir);
        const offset = vec2Scale(left, half);

        const sLeft = vec2Add(a, offset);
        const sRight = vec2Sub(a, offset);
        const eLeft = vec2Add(b, offset);
        const eRight = vec2Sub(b, offset);

        const v0 = [sLeft.x, baseY + levelBaseY, sLeft.z];
        const v1 = [sRight.x, baseY + levelBaseY, sRight.z];
        const v2 = [eRight.x, baseY + levelBaseY, eRight.z];
        const v3 = [eLeft.x, baseY + levelBaseY, eLeft.z];
        const v4 = [sLeft.x, topY + levelBaseY, sLeft.z];
        const v5 = [sRight.x, topY + levelBaseY, sRight.z];
        const v6 = [eRight.x, topY + levelBaseY, eRight.z];
        const v7 = [eLeft.x, topY + levelBaseY, eLeft.z];

        const leftN = left;
        const rightN = vec2Scale(leftN, -1);
        const startN = vec2Scale(dir, -1);
        const endN = dir;

        addOrientedQuad(v4, v7, v6, v5, [0, 1, 0]);
        addOrientedQuad(v0, v1, v2, v3, [0, -1, 0]);
        addOrientedQuad(v0, v3, v7, v4, [leftN.x, 0, leftN.z]);
        addOrientedQuad(v1, v5, v6, v2, [rightN.x, 0, rightN.z]);
        addOrientedQuad(v0, v4, v5, v1, [startN.x, 0, startN.z]);
        addOrientedQuad(v3, v2, v6, v7, [endN.x, 0, endN.z]);
      }

      for (let i = 0; i < resolvedSegments.length; i += 1) {
        const raw = resolvedSegments[i];
        if (!raw || !raw.a || !raw.b) {
          continue;
        }

        const a = vec2(Number(raw.a.x) * GRID_SIZE_UNITS, Number(raw.a.y) * GRID_SIZE_UNITS);
        const b = vec2(Number(raw.b.x) * GRID_SIZE_UNITS, Number(raw.b.y) * GRID_SIZE_UNITS);
        if (![a.x, a.z, b.x, b.z].every(Number.isFinite)) {
          continue;
        }

        if ((raw.type || "wall") === "wall") {
          const ext = cornerMaskExtensions.get(i);
          if (ext) {
            const ab = vec2Sub(b, a);
            const len = vec2Length(ab);
            if (len > 1e-8) {
              const dir = vec2Scale(ab, 1 / len);
              if (ext.a > 0) {
                const back = vec2Scale(dir, -ext.a);
                a.x += back.x;
                a.z += back.z;
              }
              if (ext.b > 0) {
                const forward = vec2Scale(dir, ext.b);
                b.x += forward.x;
                b.z += forward.z;
              }
            }
          }
        }

        const segType = raw.type || "wall";

        if (segType === "fakewall") {
          continue;
        }

        if (segType === "door") {
          const baseY = Math.min(doorHeadHeight, height);
          addSegmentPrism(a, b, baseY, height);
          continue;
        }

        if (segType === "halfwall") {
          addSegmentPrism(a, b, 0, height * HALF_WALL_HEIGHT_FACTOR);
          continue;
        }

        if (segType === "window") {
          const gap = Math.max(0, windowOpeningGap);
          if (height <= gap + 1e-6) {
            continue;
          }
          const lowerTop = (height - gap) * 0.5;
          const upperBottom = lowerTop + gap;
          addSegmentPrism(a, b, 0, lowerTop);
          addSegmentPrism(a, b, upperBottom, height);
          continue;
        }

        addSegmentPrism(a, b, 0, height);
      }

      removeOverlappingFaces(mesh);

      return mesh;
    }

    function buildGlbFromMesh(meshData) {
      const positions = new Float32Array(meshData.vertices.length * 3);
      for (let i = 0; i < meshData.vertices.length; i += 1) {
        positions[i * 3 + 0] = meshData.vertices[i][0];
        positions[i * 3 + 1] = meshData.vertices[i][1];
        positions[i * 3 + 2] = meshData.vertices[i][2];
      }

      const groupedIndices = {
        walls: [],
        floor: [],
        ceiling: []
      };

      for (let i = 0; i < meshData.faces.length; i += 1) {
        const group = meshData.faceGroups && meshData.faceGroups[i] ? meshData.faceGroups[i] : "walls";
        const bucket = groupedIndices[group] || groupedIndices.walls;
        bucket.push(meshData.faces[i][0], meshData.faces[i][1], meshData.faces[i][2]);
      }

      const posMin = [Infinity, Infinity, Infinity];
      const posMax = [-Infinity, -Infinity, -Infinity];
      for (let i = 0; i < positions.length; i += 3) {
        posMin[0] = Math.min(posMin[0], positions[i + 0]);
        posMin[1] = Math.min(posMin[1], positions[i + 1]);
        posMin[2] = Math.min(posMin[2], positions[i + 2]);
        posMax[0] = Math.max(posMax[0], positions[i + 0]);
        posMax[1] = Math.max(posMax[1], positions[i + 1]);
        posMax[2] = Math.max(posMax[2], positions[i + 2]);
      }

      const positionBytes = new Uint8Array(positions.buffer);
      const indexGroups = [
        { name: "walls", material: 0, data: new Uint32Array(groupedIndices.walls) },
        { name: "floor", material: 1, data: new Uint32Array(groupedIndices.floor) },
        { name: "ceiling", material: 2, data: new Uint32Array(groupedIndices.ceiling) }
      ].filter(g => g.data.length > 0);

      const bufferViews = [
        { buffer: 0, byteOffset: 0, byteLength: positionBytes.byteLength, target: 34962 }
      ];

      const accessors = [
        {
          bufferView: 0,
          byteOffset: 0,
          componentType: 5126,
          count: meshData.vertices.length,
          type: "VEC3",
          min: posMin,
          max: posMax
        }
      ];

      const meshDefs = [];
      let currentOffset = positionBytes.byteLength;
      const chunks = [positionBytes];

      for (let i = 0; i < indexGroups.length; i += 1) {
        const group = indexGroups[i];
        const bytes = new Uint8Array(group.data.buffer);
        const viewIndex = bufferViews.length;
        bufferViews.push({
          buffer: 0,
          byteOffset: currentOffset,
          byteLength: bytes.byteLength,
          target: 34963
        });

        const accessorIndex = accessors.length;
        accessors.push({
          bufferView: viewIndex,
          byteOffset: 0,
          componentType: 5125,
          count: group.data.length,
          type: "SCALAR"
        });

        const prettyName = group.name.charAt(0).toUpperCase() + group.name.slice(1);
        meshDefs.push({
          name: prettyName,
          primitives: [{
            attributes: { POSITION: 0 },
            indices: accessorIndex,
            material: group.material,
            mode: 4
          }]
        });

        chunks.push(bytes);
        currentOffset += bytes.byteLength;
      }

      const binByteLength = currentOffset;
      const bin = new Uint8Array(binByteLength);
      let writeOffset = 0;
      for (let i = 0; i < chunks.length; i += 1) {
        bin.set(chunks[i], writeOffset);
        writeOffset += chunks[i].byteLength;
      }

      const gltf = {
        asset: { version: "2.0", generator: "FloorPlanWallExporter" },
        scene: 0,
        scenes: [{ nodes: meshDefs.map((_, i) => i) }],
        nodes: meshDefs.map((m, i) => ({ mesh: i, name: `${meshData.name || "FloorPlan"}_${m.name}` })),
        meshes: meshDefs.map(m => ({
          name: m.name,
          primitives: m.primitives
        })),
        materials: [
          { name: "Walls", pbrMetallicRoughness: { baseColorFactor: [0.78, 0.80, 0.84, 1], metallicFactor: 0, roughnessFactor: 1 }, doubleSided: false },
          { name: "Floor", pbrMetallicRoughness: { baseColorFactor: [0.68, 0.74, 0.70, 1], metallicFactor: 0, roughnessFactor: 1 }, doubleSided: false },
          { name: "Ceiling", pbrMetallicRoughness: { baseColorFactor: [0.92, 0.92, 0.92, 1], metallicFactor: 0, roughnessFactor: 1 }, doubleSided: false }
        ],
        buffers: [{ byteLength: binByteLength }],
        bufferViews,
        accessors
      };

      const jsonBytes = new TextEncoder().encode(JSON.stringify(gltf));
      const jsonPadding = (4 - (jsonBytes.byteLength % 4)) % 4;
      const binPadding = (4 - (bin.byteLength % 4)) % 4;

      const jsonChunkLength = jsonBytes.byteLength + jsonPadding;
      const binChunkLength = bin.byteLength + binPadding;
      const totalLength = 12 + 8 + jsonChunkLength + 8 + binChunkLength;

      const glb = new ArrayBuffer(totalLength);
      const view = new DataView(glb);
      const out = new Uint8Array(glb);

      let offset = 0;
      view.setUint32(offset, 0x46546c67, true); offset += 4;
      view.setUint32(offset, 2, true); offset += 4;
      view.setUint32(offset, totalLength, true); offset += 4;

      view.setUint32(offset, jsonChunkLength, true); offset += 4;
      view.setUint32(offset, 0x4e4f534a, true); offset += 4;
      out.set(jsonBytes, offset); offset += jsonBytes.byteLength;
      for (let i = 0; i < jsonPadding; i += 1) {
        out[offset++] = 0x20;
      }

      view.setUint32(offset, binChunkLength, true); offset += 4;
      view.setUint32(offset, 0x004e4942, true); offset += 4;
      out.set(bin, offset); offset += bin.byteLength;
      for (let i = 0; i < binPadding; i += 1) {
        out[offset++] = 0x00;
      }

      return glb;
    }

    function buildCombinedWallsMeshData() {
      const floorStride = getWallHeight() + getWallThickness() * 0.5;
      const meshData = { name: "FloorPlanWalls", vertices: [], faces: [], faceGroups: [] };

      for (let i = 0; i < floors.length; i += 1) {
        const floor = floors[i];
        if (!floor.segments || floor.segments.length === 0) {
          continue;
        }

        const floorMesh = buildWallMeshData(
          floor.segments,
          i * floorStride,
          floor.name || buildLevelDefaultName(i)
        );

        if (floorMesh.vertices.length === 0 || floorMesh.faces.length === 0) {
          continue;
        }

        const vertexOffset = meshData.vertices.length;
        for (let v = 0; v < floorMesh.vertices.length; v += 1) {
          meshData.vertices.push(floorMesh.vertices[v]);
        }
        for (let f = 0; f < floorMesh.faces.length; f += 1) {
          const face = floorMesh.faces[f];
          meshData.faces.push([
            face[0] + vertexOffset,
            face[1] + vertexOffset,
            face[2] + vertexOffset
          ]);
          meshData.faceGroups.push(
            floorMesh.faceGroups && floorMesh.faceGroups[f]
              ? floorMesh.faceGroups[f]
              : "walls"
          );
        }
      }

      return meshData;
    }

    function exportWallsAsGlb() {
      const hasAnySegments = floors.some(floor => floor.segments.length > 0);
      if (!hasAnySegments) {
        status.textContent = "Draw at least one line before exporting.";
        return;
      }

      status.textContent = "Building wall geometry and exporting GLB...";

      try {
        const meshData = buildCombinedWallsMeshData();

        if (meshData.vertices.length === 0 || meshData.faces.length === 0) {
          status.textContent = "No geometry generated. Check wall settings and plan lines.";
          return;
        }
        const glbBuffer = buildGlbFromMesh(meshData);
        const blob = new Blob([glbBuffer], { type: "model/gltf-binary" });
        const now = new Date();
        const { datePart, timePart } = formatDateParts(now);
        const safeTitle = sanitizeFilenamePart(planTitle);
        const filename = `${safeTitle}-${datePart}-${timePart}.glb`;
        downloadBlob(blob, filename);
        status.textContent = `Walls GLB exported. Vertices: ${meshData.vertices.length}, Triangles: ${meshData.faces.length}`;
      } catch (error) {
        console.error(error);
        status.textContent = "Failed to export walls GLB. Check browser console for details.";
      }
    }

    async function ensurePreview3dRuntime() {
      if (preview3dRuntime) {
        return preview3dRuntime;
      }

      const THREE = await import(THREE_MODULE_URL);
      const { OrbitControls } = await import(ORBIT_CONTROLS_MODULE_URL);
      preview3dRuntime = { THREE, OrbitControls };
      return preview3dRuntime;
    }

    function preloadPreview3dRuntime() {
      ensurePreview3dRuntime().catch(error => {
        console.warn("Failed to preload 3D preview runtime.", error);
      });
    }

    function capturePreview3dViewState() {
      const state = preview3dCanvas.__preview3dState;
      if (!state || !state.camera || !state.controls || !state.controls.target) {
        return;
      }

      preview3dViewState = {
        cameraPosition: {
          x: state.camera.position.x,
          y: state.camera.position.y,
          z: state.camera.position.z
        },
        cameraQuaternion: {
          x: state.camera.quaternion.x,
          y: state.camera.quaternion.y,
          z: state.camera.quaternion.z,
          w: state.camera.quaternion.w
        },
        target: {
          x: state.controls.target.x,
          y: state.controls.target.y,
          z: state.controls.target.z
        }
      };
    }

    function stopPreview3dLoop() {
      capturePreview3dViewState();

      if (preview3dAnimationId !== null) {
        cancelAnimationFrame(preview3dAnimationId);
        preview3dAnimationId = null;
      }
      if (preview3dResizeHandler) {
        window.removeEventListener("resize", preview3dResizeHandler);
        preview3dResizeHandler = null;
      }
      if (preview3dCanvas.__preview3dState) {
        const state = preview3dCanvas.__preview3dState;
        if (state.onMouseUp) {
          preview3dCanvas.removeEventListener("mouseup", state.onMouseUp);
        }
        if (state.controls) {
          state.controls.dispose();
        }
        if (state.renderer) {
          state.renderer.dispose();
        }
      }
      preview3dCanvas.__preview3dState = null;
    }

    function closePreview3d() {
      stopPreview3dLoop();
      preview3dOverlay.classList.add("hidden");
      preview3dOverlay.setAttribute("aria-hidden", "true");
    }

    async function openPreview3d() {
      const hasAnySegments = floors.some(floor => floor.segments.length > 0);
      if (!hasAnySegments) {
        status.textContent = "Draw at least one line before opening 3D preview.";
        return;
      }

      const meshData = buildCombinedWallsMeshData();
      if (meshData.vertices.length === 0 || meshData.faces.length === 0) {
        status.textContent = "No geometry generated. Check wall settings and plan lines.";
        return;
      }

      status.textContent = "Building 3D preview...";

      try {
        const { THREE, OrbitControls } = await ensurePreview3dRuntime();

        stopPreview3dLoop();
        preview3dOverlay.classList.remove("hidden");
        preview3dOverlay.setAttribute("aria-hidden", "false");

        const renderer = new THREE.WebGLRenderer({ canvas: preview3dCanvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe9f2ff);

        const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 5000);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0, 0, 0);

        const hemi = new THREE.HemisphereLight(0xffffff, 0x9fb7d1, 0.95);
        scene.add(hemi);
        const dir = new THREE.DirectionalLight(0xffffff, 0.7);
        dir.position.set(8, 14, 10);
        scene.add(dir);

        const vertices = new Float32Array(meshData.vertices.length * 3);
        for (let i = 0; i < meshData.vertices.length; i += 1) {
          vertices[i * 3 + 0] = meshData.vertices[i][0];
          vertices[i * 3 + 1] = meshData.vertices[i][1];
          vertices[i * 3 + 2] = meshData.vertices[i][2];
        }
        const indices = new Uint32Array(meshData.faces.length * 3);
        for (let i = 0; i < meshData.faces.length; i += 1) {
          indices[i * 3 + 0] = meshData.faces[i][0];
          indices[i * 3 + 1] = meshData.faces[i][1];
          indices[i * 3 + 2] = meshData.faces[i][2];
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
        geometry.setIndex(new THREE.BufferAttribute(indices, 1));
        geometry.computeVertexNormals();

        const material = new THREE.MeshStandardMaterial({ color: 0xc4cbd6, roughness: 1, metalness: 0 });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const gridHelper = new THREE.GridHelper(40, 80, 0x8da3be, 0xc7d7ea);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        const bbox = new THREE.Box3().setFromObject(mesh);
        const size = bbox.getSize(new THREE.Vector3());
        const center = bbox.getCenter(new THREE.Vector3());
        const radius = Math.max(size.x, size.y, size.z, 1);

        const hasSavedView = !!(preview3dViewState
          && preview3dViewState.cameraPosition
          && preview3dViewState.cameraQuaternion
          && preview3dViewState.target
          && [
            preview3dViewState.cameraPosition.x,
            preview3dViewState.cameraPosition.y,
            preview3dViewState.cameraPosition.z,
            preview3dViewState.cameraQuaternion.x,
            preview3dViewState.cameraQuaternion.y,
            preview3dViewState.cameraQuaternion.z,
            preview3dViewState.cameraQuaternion.w,
            preview3dViewState.target.x,
            preview3dViewState.target.y,
            preview3dViewState.target.z
          ].every(Number.isFinite));

        if (hasSavedView) {
          controls.target.set(
            preview3dViewState.target.x,
            preview3dViewState.target.y,
            preview3dViewState.target.z
          );
          camera.position.set(
            preview3dViewState.cameraPosition.x,
            preview3dViewState.cameraPosition.y,
            preview3dViewState.cameraPosition.z
          );
          camera.quaternion.set(
            preview3dViewState.cameraQuaternion.x,
            preview3dViewState.cameraQuaternion.y,
            preview3dViewState.cameraQuaternion.z,
            preview3dViewState.cameraQuaternion.w
          );
        } else {
          controls.target.copy(center);
          camera.position.set(center.x + radius * 1.3, center.y + radius * 1.1, center.z + radius * 1.3);
        }
        camera.near = Math.max(0.01, radius / 200);
        camera.far = Math.max(100, radius * 50);
        camera.updateProjectionMatrix();

        function resizeRenderer() {
          const rect = preview3dCanvas.getBoundingClientRect();
          const width = Math.max(1, Math.floor(rect.width));
          const height = Math.max(1, Math.floor(rect.height));
          renderer.setSize(width, height, false);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        }

        resizeRenderer();
        preview3dResizeHandler = resizeRenderer;
        window.addEventListener("resize", preview3dResizeHandler);

        const onPreviewMouseUp = () => {
          capturePreview3dViewState();
        };
        preview3dCanvas.addEventListener("mouseup", onPreviewMouseUp);

        preview3dCanvas.__preview3dState = {
          renderer,
          scene,
          camera,
          controls,
          onMouseUp: onPreviewMouseUp
        };

        const animate = () => {
          const state = preview3dCanvas.__preview3dState;
          if (!state) {
            return;
          }
          state.controls.update();
          state.renderer.render(state.scene, state.camera);
          preview3dAnimationId = requestAnimationFrame(animate);
        };
        animate();

        status.textContent = `3D preview ready. Vertices: ${meshData.vertices.length}, Triangles: ${meshData.faces.length}`;
      } catch (error) {
        console.error(error);
        closePreview3d();
        status.textContent = "Failed to open 3D preview. Check browser console for details.";
      }
    }

    canvas.addEventListener("mousedown", event => {
      if (event.button === 1) {
        event.preventDefault();
        const p = getPointerPosition(event);
        isPanning = true;
        panLastPointer = p;
        return;
      }

      if (event.button !== 0) {
        return;
      }

      const p = getPointerPosition(event);
      pointerGrid = canvasToGrid(p.x, p.y);
      const pointerWorld = canvasToWorld(p.x, p.y);

      if (activeTool === "select") {
        const hitIndex = findNearestSegmentIndex(pointerGrid, () => true);
        const addMode = event.shiftKey;
        const removeMode = event.ctrlKey;
        const endpointHit = !addMode && !removeMode ? getSingleSelectedEndpointHit(pointerWorld) : null;

        if (endpointHit) {
          dragState = {
            mode: "move-endpoint",
            index: endpointHit.index,
            endpoint: endpointHit.endpoint,
            startPointer: clonePoint(pointerGrid),
            startPoint: endpointHit.startPoint,
            undoSnapshot: captureCurrentProjectSnapshot()
          };
          status.textContent = "Drag endpoint to reshape line.";
          redraw();
          return;
        }

        if (hitIndex >= 0 && !addMode && !removeMode) {
          if (!selectedSegmentIndices.has(hitIndex)) {
            selectedSegmentIndices.clear();
            selectedSegmentIndices.add(hitIndex);
          }

          const selected = Array.from(selectedSegmentIndices);
          dragState = {
            mode: "move-selection",
            indices: selected,
            startPointer: clonePoint(pointerGrid),
            undoSnapshot: captureCurrentProjectSnapshot(),
            originals: selected.map(idx => ({
              index: idx,
              a: clonePoint(segments[idx].a),
              b: clonePoint(segments[idx].b)
            }))
          };
          status.textContent = `Selected ${selectedSegmentIndices.size} line(s). Drag to move.`;
        } else if (hitIndex >= 0 && (addMode || removeMode)) {
          if (addMode) {
            selectedSegmentIndices.add(hitIndex);
          }
          if (removeMode) {
            selectedSegmentIndices.delete(hitIndex);
          }
          dragState = null;
          status.textContent = `Selected ${selectedSegmentIndices.size} line(s).`;
        } else {
          if (!addMode && !removeMode) {
            selectedSegmentIndices.clear();
          }
          isMarqueeSelecting = true;
          marqueeStartWorld = clonePoint(pointerWorld);
          marqueeEndWorld = clonePoint(pointerWorld);
          marqueeMode = addMode ? "add" : removeMode ? "remove" : "replace";
          dragState = null;
          status.textContent = "Drag to marquee-select lines.";
        }
        redraw();
        return;
      }

      if (activeTool === "erase") {
        isErasingDrag = true;
        if (eraseAtPoint(pointerGrid)) {
          status.textContent = "Wall removed.";
        } else {
          status.textContent = "No line found under cursor.";
        }
        redraw();
        return;
      }

      if (activeTool === "cut") {
        const index = findNearestSegmentIndex(pointerWorld, seg => seg.type === "wall" || seg.type === "halfwall" || seg.type === "fakewall" || seg.type === "window");
        if (index >= 0) {
          if (splitSegmentAtPoint(index, pointerWorld)) {
            status.textContent = "Segment cut into two parts.";
          } else {
            status.textContent = "Click away from endpoints to cut.";
          }
        } else {
          status.textContent = "No cuttable segment found under cursor.";
        }
        redraw();
        return;
      }

      startGrid = clonePoint(pointerGrid);
      ellipseForceCircle = activeTool === "ellipse" && event.ctrlKey;
      drawing = true;
      redraw();
    });

    canvas.addEventListener("mousemove", event => {
      const p = getPointerPosition(event);

      if (isPanning && panLastPointer) {
        const dx = p.x - panLastPointer.x;
        const dy = p.y - panLastPointer.y;
        viewOffsetX += dx;
        viewOffsetY += dy;
        panLastPointer = p;
        pointerGrid = canvasToGrid(p.x, p.y);
        queueLocalAutosave();
        redraw();
        return;
      }

      pointerGrid = canvasToGrid(p.x, p.y);
      const pointerWorld = canvasToWorld(p.x, p.y);

      if (drawing && activeTool === "ellipse") {
        ellipseForceCircle = event.ctrlKey;
      }

      if (activeTool === "erase" && isErasingDrag) {
        if (eraseAtPoint(pointerGrid)) {
          status.textContent = "Line removed.";
        }
        redraw();
        return;
      }

      if (activeTool === "select" && isMarqueeSelecting) {
        marqueeEndWorld = clonePoint(pointerWorld);
        redraw();
        return;
      }

      if (activeTool === "select" && dragState) {
        const dx = pointerGrid.x - dragState.startPointer.x;
        const dy = pointerGrid.y - dragState.startPointer.y;

        if (dragState.mode === "move-endpoint") {
          const seg = segments[dragState.index];
          if (!seg) {
            redraw();
            return;
          }

          const movedX = dragState.startPoint.x + dx;
          const movedY = dragState.startPoint.y + dy;
          if (dragState.endpoint === "a") {
            seg.a.x = movedX;
            seg.a.y = movedY;
          } else {
            seg.b.x = movedX;
            seg.b.y = movedY;
          }
        } else {
          for (let i = 0; i < dragState.originals.length; i += 1) {
            const original = dragState.originals[i];
            const seg = segments[original.index];
            if (!seg) {
              continue;
            }
            seg.a.x = original.a.x + dx;
            seg.a.y = original.a.y + dy;
            seg.b.x = original.b.x + dx;
            seg.b.y = original.b.y + dy;
          }
        }

        queueLocalAutosave();
      }

      redraw();
    });

    canvas.addEventListener("mouseup", event => {
      if (event.button === 1) {
        isPanning = false;
        panLastPointer = null;
        return;
      }

      if (event.button === 0) {
        isErasingDrag = false;
      }

      if (event.button !== 0) {
        return;
      }

      if (activeTool === "select") {
        if (isMarqueeSelecting && marqueeStartWorld && marqueeEndWorld) {
          const hits = collectSegmentsInMarquee(marqueeStartWorld, marqueeEndWorld);

          if (marqueeMode === "replace") {
            selectedSegmentIndices.clear();
          }

          if (marqueeMode === "add" || marqueeMode === "replace") {
            for (let i = 0; i < hits.length; i += 1) {
              selectedSegmentIndices.add(hits[i]);
            }
          } else if (marqueeMode === "remove") {
            for (let i = 0; i < hits.length; i += 1) {
              selectedSegmentIndices.delete(hits[i]);
            }
          }

          status.textContent = `Selected ${selectedSegmentIndices.size} line(s).`;
        } else if (dragState) {
          if (dragState.mode === "move-endpoint") {
            const changed = didDragChangeGeometry(dragState);
            const merged = tryMergeMovedEndpoint(dragState);
            if ((changed || merged) && dragState.undoSnapshot) {
              recordUndoSnapshot(dragState.undoSnapshot);
            }
            status.textContent = merged ? "Lines merged." : "Line endpoint moved.";
          } else {
            if (didDragChangeGeometry(dragState) && dragState.undoSnapshot) {
              recordUndoSnapshot(dragState.undoSnapshot);
            }
            status.textContent = `Moved ${selectedSegmentIndices.size} line(s).`;
          }
        }

        isMarqueeSelecting = false;
        marqueeStartWorld = null;
        marqueeEndWorld = null;
        marqueeMode = "replace";
        dragState = null;
        redraw();
        return;
      }

      if (activeTool === "erase") {
        return;
      }

      if (activeTool === "cut") {
        return;
      }

      if (!drawing || !startGrid) {
        return;
      }

      const p = getPointerPosition(event);
      const endGrid = canvasToGrid(p.x, p.y);

      if (activeTool === "door") {
        const doorEnd = projectDoorEndpoint(startGrid, endGrid);
        const carved = carveDoorIntoWall(startGrid, doorEnd);
        const doorA = carved ? carved.a : { x: startGrid.x, y: startGrid.y };
        const doorB = carved ? carved.b : { x: doorEnd.x, y: doorEnd.y };
        addSegmentWithCuts("door", doorA, doorB);
        status.textContent = `Door added (width ${DOOR_WIDTH_UNITS}). Total segments: ${segments.length}`;
      } else if (activeTool === "window" && (startGrid.x !== endGrid.x || startGrid.y !== endGrid.y)) {
        const carved = carveDoorIntoWall(startGrid, endGrid);
        const windowA = carved ? carved.a : { x: startGrid.x, y: startGrid.y };
        const windowB = carved ? carved.b : { x: endGrid.x, y: endGrid.y };
        addSegmentWithCuts("window", windowA, windowB);
        status.textContent = `Window added (gap ${getWindowOpeningGap()}). Total segments: ${segments.length}`;
      } else if (activeTool === "box") {
        const minX = Math.min(startGrid.x, endGrid.x);
        const maxX = Math.max(startGrid.x, endGrid.x);
        const minY = Math.min(startGrid.y, endGrid.y);
        const maxY = Math.max(startGrid.y, endGrid.y);

        const p0 = { x: minX, y: minY };
        const p1 = { x: maxX, y: minY };
        const p2 = { x: maxX, y: maxY };
        const p3 = { x: minX, y: maxY };

        addWallSegmentWithCut(p0, p1);
        addWallSegmentWithCut(p1, p2);
        addWallSegmentWithCut(p2, p3);
        addWallSegmentWithCut(p3, p0);
        status.textContent = `Box added. Total segments: ${segments.length}`;
      } else if (activeTool === "ellipse") {
        const forceCircle = ellipseForceCircle || event.ctrlKey;
        const addedCount = addEllipseAsWalls(startGrid, endGrid, forceCircle);
        if (addedCount > 0) {
          status.textContent = `${forceCircle ? "Circle" : "Ellipse"} added. Nodes: ${addedCount}. Total segments: ${segments.length}`;
        }
      } else if (activeTool === "halfwall" && (startGrid.x !== endGrid.x || startGrid.y !== endGrid.y)) {
        addSegmentWithCuts("halfwall", startGrid, endGrid);
        status.textContent = `Half wall added. Total segments: ${segments.length}`;
      } else if (activeTool === "fakewall" && (startGrid.x !== endGrid.x || startGrid.y !== endGrid.y)) {
        addSegmentWithCuts("fakewall", startGrid, endGrid);
        status.textContent = `Fake wall added. Total segments: ${segments.length}`;
      } else if (startGrid.x !== endGrid.x || startGrid.y !== endGrid.y) {
        addWallSegmentWithCut(startGrid, endGrid);
        status.textContent = `Wall added. Total segments: ${segments.length}`;
      }

      drawing = false;
      startGrid = null;
      redraw();
    });

    canvas.addEventListener("mouseleave", () => {
      isPanning = false;
      isErasingDrag = false;
      panLastPointer = null;
      if (activeTool === "select") {
        isMarqueeSelecting = false;
        marqueeStartWorld = null;
        marqueeEndWorld = null;
        marqueeMode = "replace";
        dragState = null;
      }
      ellipseForceCircle = false;
      pointerGrid = null;
      redraw();
    });

    canvas.addEventListener("auxclick", event => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });

    canvas.addEventListener("contextmenu", event => {
      event.preventDefault();
      if (activeTool !== "select") {
        setTool("select");
      }

      const p = getPointerPosition(event);
      const pointer = canvasToGrid(p.x, p.y);
      const hitIndex = findNearestSegmentIndex(pointer, () => true);
      if (hitIndex >= 0) {
        selectedSegmentIndices.clear();
        selectedSegmentIndices.add(hitIndex);
        status.textContent = "Tool changed to select. 1 line selected.";
      } else {
        status.textContent = "Tool changed to select.";
      }
      redraw();
    });

    canvas.addEventListener("wheel", event => {
      event.preventDefault();
      const p = getPointerPosition(event);
      const zoomFactor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
      setCanvasZoomAtPoint(gridPx * zoomFactor, p.x, p.y);
    }, { passive: false });

    window.addEventListener("keydown", event => {
      const target = event.target;
      const tag = target && target.tagName ? target.tagName.toLowerCase() : "";
      if (tag === "input" || tag === "textarea" || tag === "select" || (target && target.isContentEditable)) {
        return;
      }

      const key = event.key.toLowerCase();
      const isPrimaryModifier = event.ctrlKey || event.metaKey;
      if (isPrimaryModifier && !event.shiftKey && key === "z") {
        event.preventDefault();
        if (performUndo()) {
          status.textContent = "Undo applied.";
        } else {
          status.textContent = "Nothing to undo.";
        }
      } else if (isPrimaryModifier && (key === "y" || (event.shiftKey && key === "z"))) {
        event.preventDefault();
        if (performRedo()) {
          status.textContent = "Redo applied.";
        } else {
          status.textContent = "Nothing to redo.";
        }
      } else if (isPrimaryModifier && key === "a") {
        event.preventDefault();
        selectedSegmentIndices = new Set();
        for (let i = 0; i < segments.length; i += 1) {
          selectedSegmentIndices.add(i);
        }
        isMarqueeSelecting = false;
        marqueeStartWorld = null;
        marqueeEndWorld = null;
        marqueeMode = "replace";
        dragState = null;
        status.textContent = `Selected ${selectedSegmentIndices.size} line(s).`;
        redraw();
      } else if (key === "delete" || key === "backspace" || key === "x") {
        if (selectedSegmentIndices.size > 0) {
          event.preventDefault();
          const removedCount = deleteSelectedSegments();
          status.textContent = `Removed ${removedCount} selected line(s).`;
          redraw();
        }
      } else if (key === "w") {
        event.preventDefault();
        cycleToolGroup(["wall", "halfwall", "fakewall", "box"], "W group");
      } else if (key === "s") {
        event.preventDefault();
        cycleToolGroup(["select", "erase"], "S group");
      } else if (key === "d") {
        event.preventDefault();
        cycleToolGroup(["door", "window", "cut"], "D group");
      }
    });

    undoButton.addEventListener("click", () => {
      if (performUndo()) {
        status.textContent = "Undo applied.";
      } else {
        status.textContent = "Nothing to undo.";
      }
    });

    redoButton.addEventListener("click", () => {
      if (performRedo()) {
        status.textContent = "Redo applied.";
      } else {
        status.textContent = "Nothing to redo.";
      }
    });

    clearButton.addEventListener("click", () => {
      const hasAnySegments = floors.some(level => Array.isArray(level.segments) && level.segments.length > 0);
      if (!hasAnySegments) {
        status.textContent = "All levels are already empty.";
        return;
      }

      const confirmed = window.confirm("Clear all lines on all levels? You can undo this action.");
      if (!confirmed) {
        status.textContent = "Clear canceled.";
        return;
      }

      const undoBeforeClear = captureCurrentProjectSnapshot();
      for (let i = 0; i < floors.length; i += 1) {
        floors[i].segments.length = 0;
      }
      selectedSegmentIndices.clear();
      isMarqueeSelecting = false;
      marqueeStartWorld = null;
      marqueeEndWorld = null;
      marqueeMode = "replace";
      dragState = null;
      recordUndoSnapshot(undoBeforeClear);
      queueLocalAutosave();
      renderLevelList();
      status.textContent = "All levels cleared.";
      redraw();
    });

    saveButton.addEventListener("click", () => {
      saveProject();
    });

    loadButton.addEventListener("click", () => {
      loadInput.value = "";
      loadInput.click();
    });

    loadInput.addEventListener("change", () => {
      if (!loadInput.files || loadInput.files.length === 0) {
        return;
      }
      loadProjectFromFile(loadInput.files[0]);
    });

    toolWallButton.addEventListener("click", () => setTool("wall"));
    toolBoxButton.addEventListener("click", () => setTool("box"));
    toolEllipseButton.addEventListener("click", () => setTool("ellipse"));
    toolHalfWallButton.addEventListener("click", () => setTool("halfwall"));
    toolFakeWallButton.addEventListener("click", () => setTool("fakewall"));
    toolDoorButton.addEventListener("click", () => setTool("door"));
    toolWindowButton.addEventListener("click", () => setTool("window"));
    toolCutButton.addEventListener("click", () => setTool("cut"));
    toolSelectButton.addEventListener("click", () => setTool("select"));
    toolEraseButton.addEventListener("click", () => setTool("erase"));

    zoomOutButton.addEventListener("click", () => setCanvasZoom(gridPx - 2));
    zoomInButton.addEventListener("click", () => setCanvasZoom(gridPx + 2));
    zoomResetButton.addEventListener("click", () => setCanvasZoom(DEFAULT_GRID_PX));

    floorAddAboveButton.addEventListener("click", () => {
      addLevel();
    });

    floorMoveUpButton.addEventListener("click", () => {
      moveCurrentLevel(1);
    });

    floorMoveDownButton.addEventListener("click", () => {
      moveCurrentLevel(-1);
    });

    floorRemoveButton.addEventListener("click", () => {
      removeCurrentLevel();
    });

    onionToggleButton.addEventListener("click", () => {
      isOnionViewEnabled = !isOnionViewEnabled;
      updateOnionToggleButton();
      saveUiState();
      status.textContent = isOnionViewEnabled ? "Onion view enabled." : "Onion view disabled.";
      redraw();
    });

    planTitleInput.addEventListener("input", () => {
      setPlanTitle(planTitleInput.value);
      queueLocalAutosave();
    });

    thicknessInput.addEventListener("change", () => {
      queueLocalAutosave();
      redraw();
    });
    heightInput.addEventListener("change", () => {
      queueLocalAutosave();
      redraw();
    });
    joinModeSelect.addEventListener("change", () => {
      queueLocalAutosave();
      redraw();
    });
    doorHeightInput.addEventListener("change", () => {
      queueLocalAutosave();
      redraw();
    });
    windowGapInput.addEventListener("change", () => {
      queueLocalAutosave();
      redraw();
    });

    exportButton.addEventListener("click", () => {
      exportWallsAsGlb();
    });

    preview3dButton.addEventListener("click", () => {
      openPreview3d();
    });

    preview3dCloseButton.addEventListener("click", () => {
      closePreview3d();
      status.textContent = "3D preview closed.";
    });

    preview3dOverlay.addEventListener("click", event => {
      if (event.target === preview3dOverlay) {
        closePreview3d();
        status.textContent = "3D preview closed.";
      }
    });

    slabPreviewToggleButton.addEventListener("click", () => {
      isSlabPreviewVisible = !isSlabPreviewVisible;
      updateSlabPreviewToggleButton();

      if (isSlabPreviewVisible) {
        const polygons = computeSlabPolygonsForLevel(segments);
        status.textContent = polygons.length > 0
          ? `Slab preview enabled. Closed regions detected: ${polygons.length}.`
          : "Slab preview enabled. No closed regions detected on this level.";
      } else {
        status.textContent = "Slab preview hidden.";
      }

      redraw();
    });

    exportPropsToggleButton.addEventListener("click", () => {
      isExportPropsOpen = !isExportPropsOpen;
      applyExportPropsVisibility();
      saveUiState();
    });

    loadUiState();
    preloadPreview3dRuntime();
    setPlanTitle(planTitle);
    updateOnionToggleButton();
    updateSlabPreviewToggleButton();
    applyExportPropsVisibility();
    renderLevelList();

    const hasAutosavedPlan = loadProjectFromLocalStorage();
    if (hasAutosavedPlan) {
      status.textContent = `Autosaved plan loaded. Level ${currentLevelIndex + 1}/${floors.length}, segments: ${segments.length}`;
    }
    renderLevelList();
    redraw();

    window.addEventListener("beforeunload", () => {
      saveProjectToLocalStorage();
    });
  </script>
</body>
</html>
