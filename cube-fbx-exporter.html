<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" crossorigin="anonymous" />
  <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/controls/OrbitControls.js" crossorigin="anonymous" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"
      }
    }
  </script>
  <title>Floor Plan Wall GLB Exporter</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --ink: #1e2530;
      --muted: #5c697a;
      --accent: #1479ff;
      --accent-ink: #ffffff;
      --accent-soft: #cfe3ff;
      --border: #d8e0ec;
      --grid: #dce4f0;
      --line: #0f1722;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #ffffff 0%, var(--bg) 65%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 95vw;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 35, 65, 0.08);
    }

    .toolbar-top,
    .toolbar-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar-top {
      margin-bottom: 10px;
    }

    .props-toggle {
      background: #eaf2ff;
      color: #21406e;
      padding: 10px 12px;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .export-props-panel {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .export-props-panel.hidden {
      display: none;
    }

    .toolbar-tools {
      margin-bottom: 14px;
    }

    .tool-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tool-group + .tool-group {
      border-left: 1px solid var(--border);
      padding-left: 10px;
      margin-left: 2px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-left: 8px;
    }

    .field {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #32455f;
      font-size: 0.9rem;
      background: #f2f6fd;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
    }

    .field input,
    .field select {
      border: 1px solid #c7d5ea;
      border-radius: 6px;
      padding: 4px 6px;
      background: #fff;
      color: #1f2d3d;
      font-size: 0.9rem;
      width: 86px;
    }

    .field input.plan-title {
      width: 220px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 12px 16px;
      font-size: 0.96rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button.secondary {
      background: #edf3fd;
      color: #22406d;
    }

    button.primary-soft {
      background: #4f93ff;
      color: #ffffff;
    }

    button.tool.active {
      background: #0f1722;
      color: #ffffff;
    }

    button:hover {
      filter: brightness(1.07);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #status {
      margin-top: 14px;
      min-height: 1.4em;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .canvas-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fdfefe;
    }

    .editor-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 12px;
      align-items: start;
    }

    .editor-main {
      min-width: 0;
    }

    .floors-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fbff;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 700px;
    }

    .floors-header {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #33507a;
    }

    .floors-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .floors-actions button {
      padding: 8px 10px;
      font-size: 0.82rem;
      border-radius: 8px;
    }

    .floors-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      padding-right: 2px;
    }

    .floor-item {
      border: 1px solid #cfdcf0;
      border-radius: 8px;
      background: #ffffff;
      color: #27456f;
      padding: 8px 10px;
      font-size: 0.88rem;
      text-align: left;
      cursor: pointer;
    }

    .floor-item.active {
      background: #dbeafe;
      border-color: #93c5fd;
      color: #143b66;
      font-weight: 700;
    }

    @media (max-width: 1080px) {
      .editor-layout {
        grid-template-columns: 1fr;
      }

      .floors-panel {
        max-height: none;
      }
    }

    .zoom-bar {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f7faff;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .zoom-bar .label {
      color: #22406d;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .zoom-bar button {
      padding: 8px 12px;
      font-size: 0.9rem;
      border-radius: 8px;
    }

    .zoom-readout {
      margin-left: auto;
      color: #32455f;
      font-size: 0.9rem;
      font-weight: 600;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .preview3d-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 34, 0.66);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .preview3d-overlay.hidden {
      display: none;
    }

    .preview3d-card {
      width: min(1100px, 96vw);
      height: min(760px, 90vh);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      box-shadow: 0 18px 40px rgba(15, 35, 65, 0.24);
    }

    .preview3d-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #f7fbff;
    }

    .preview3d-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #21406e;
      letter-spacing: 0.02em;
    }

    .preview3d-hint {
      font-size: 0.82rem;
      color: #4a607d;
      margin-left: 8px;
      font-weight: 500;
    }

    .preview3d-canvas-wrap {
      width: 100%;
      height: 100%;
      background: #eaf2ff;
      position: relative;
    }

    #preview3dCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      background: linear-gradient(180deg, #f4f9ff 0%, #dce9ff 100%);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="toolbar-top">
      <label class="field">Plan Title
        <input id="planTitleInput" class="plan-title" type="text" maxlength="120" value="Untitled" />
      </label>
      <button id="exportBtn" type="button">Export Model</button>
      <button id="preview3dBtn" type="button" class="primary-soft">Preview 3D</button>
      <button id="saveBtn" type="button" class="secondary">Save Plan</button>
      <button id="loadBtn" type="button" class="secondary">Load Plan</button>
      <button id="undoBtn" type="button" class="secondary">Undo</button>
      <button id="redoBtn" type="button" class="secondary">Redo</button>
      <button id="clearBtn" type="button" class="secondary">Clear Plan</button>
      <button id="exportPropsToggleBtn" type="button" class="secondary props-toggle" aria-expanded="false">Show Export Properties</button>
      <div id="exportPropsPanel" class="export-props-panel hidden">
        <label class="field">Thickness
          <input id="thicknessInput" type="number" min="0.01" step="0.125" value="0.125" />
        </label>
        <label class="field">Height
          <input id="heightInput" type="number" min="0.25" step="0.25" value="2.5" />
        </label>
        <label class="field">Join
          <select id="joinModeSelect">
            <option value="miter">Miter</option>
            <option value="bevel">Bevel</option>
          </select>
        </label>
        <label class="field">Door Height
          <input id="doorHeightInput" type="number" min="0.25" step="0.25" value="2" />
        </label>
        <label class="field">Window Gap
          <input id="windowGapInput" type="number" min="0.1" step="0.1" value="0.5" />
        </label>
      </div>
    </div>

    <div class="toolbar-tools">
      <div class="tool-group" aria-label="W group tools">
        <button id="toolWallBtn" type="button" class="secondary tool active" title="Shortcut: W (cycles W group)">Wall Tool</button>
        <button id="toolHalfWallBtn" type="button" class="secondary tool" title="Shortcut: W (cycles W group)">Half Wall Tool</button>
        <button id="toolFakeWallBtn" type="button" class="secondary tool" title="Shortcut: W (cycles W group)">Fake Wall Tool</button>
        <button id="toolBoxBtn" type="button" class="secondary tool" title="Shortcut: W (cycles W group)">Box Tool</button>
        <button id="toolEllipseBtn" type="button" class="secondary tool" title="Shortcut: W (cycles W group)" hidden>Ellipse Tool</button>
      </div>
      <div class="tool-group" aria-label="D group tools">
        <button id="toolDoorBtn" type="button" class="secondary tool" title="Shortcut: D (cycles D group)">Door Tool</button>
        <button id="toolWindowBtn" type="button" class="secondary tool" title="Shortcut: D (cycles D group)">Window Tool</button>
        <button id="toolCutBtn" type="button" class="secondary tool" title="Shortcut: D (cycles D group)">Cut Tool</button>
      </div>
      <div class="tool-group" aria-label="S group tools">
        <button id="toolSelectBtn" type="button" class="secondary tool" title="Shortcut: S (cycles S group)">Select/Move</button>
        <button id="toolEraseBtn" type="button" class="secondary tool" title="Shortcut: S (cycles S group)">Remove Wall</button>
      </div>
      <div class="tool-group" aria-label="View tools">
        <button id="slabPreviewToggleBtn" type="button" class="secondary">Preview Slabs</button>
      </div>
    </div>

    <div class="editor-layout">
      <div class="editor-main">
        <div class="canvas-wrap">
          <canvas id="planCanvas" width="920" height="560"></canvas>
        </div>

        <div class="zoom-bar" aria-label="Canvas zoom controls">
          <span class="label">Canvas Zoom</span>
          <button id="zoomOutBtn" type="button" class="secondary">-</button>
          <button id="zoomInBtn" type="button" class="secondary">+</button>
          <button id="zoomResetBtn" type="button" class="secondary">Reset</button>
          <span id="zoomReadout" class="zoom-readout">100%</span>
          <span id="meta" class="meta">Grid: 0.25 | Wall Height: 2.5 | Thickness: 0.125</span>
        </div>
      </div>

      <aside class="floors-panel" aria-label="Level controls">
        <div class="floors-header">Levels</div>
        <div class="floors-actions">
          <button id="floorAddAboveBtn" type="button" class="secondary">+ Level</button>
          <button id="floorMoveUpBtn" type="button" class="secondary">Move Up</button>
          <button id="floorMoveDownBtn" type="button" class="secondary">Move Down</button>
          <button id="floorRemoveBtn" type="button" class="secondary">Remove</button>
          <button id="onionToggleBtn" type="button" class="secondary">Onion View: On</button>
        </div>
        <div id="floorsList" class="floors-list"></div>
      </aside>
    </div>

    <div id="status" aria-live="polite"></div>
    <input id="loadInput" type="file" accept=".json,application/json" style="display:none" />
  </main>

  <div id="preview3dOverlay" class="preview3d-overlay hidden" aria-hidden="true">
    <div class="preview3d-card" role="dialog" aria-label="3D model preview">
      <div class="preview3d-topbar">
        <div>
          <span class="preview3d-title">3D Model Preview</span>
          <span class="preview3d-hint">Drag to orbit, wheel to zoom, right-click drag to pan</span>
        </div>
        <button id="preview3dCloseBtn" type="button" class="secondary">Close</button>
      </div>
      <div class="preview3d-canvas-wrap">
        <canvas id="preview3dCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    const GRID_SIZE_UNITS = 0.25;
    const DEFAULT_GRID_PX = 12;
    const MIN_GRID_PX = 2;
    const MAX_GRID_PX = 36;
    const THREE_MODULE_URL = "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";
    const ORBIT_CONTROLS_MODULE_URL = "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/controls/OrbitControls.js";
    const LOCAL_UI_STORAGE_KEY = "floor-plan-editor.ui.v1";
    let gridPx = DEFAULT_GRID_PX;
    const DOOR_WIDTH_UNITS = 1;
    const DEFAULT_DOOR_HEAD_HEIGHT_UNITS = 2;
    const DEFAULT_WINDOW_OPENING_GAP_UNITS = 0.5;
    const HALF_WALL_HEIGHT_FACTOR = 0.5;

    const exportButton = document.getElementById("exportBtn");
    const preview3dButton = document.getElementById("preview3dBtn");
    const slabPreviewToggleButton = document.getElementById("slabPreviewToggleBtn");
    const saveButton = document.getElementById("saveBtn");
    const loadButton = document.getElementById("loadBtn");
    const loadInput = document.getElementById("loadInput");
    const undoButton = document.getElementById("undoBtn");
    const redoButton = document.getElementById("redoBtn");
    const clearButton = document.getElementById("clearBtn");
    const toolWallButton = document.getElementById("toolWallBtn");
    const toolBoxButton = document.getElementById("toolBoxBtn");
    const toolEllipseButton = document.getElementById("toolEllipseBtn");
    const toolHalfWallButton = document.getElementById("toolHalfWallBtn");
    const toolFakeWallButton = document.getElementById("toolFakeWallBtn");
    const toolDoorButton = document.getElementById("toolDoorBtn");
    const toolWindowButton = document.getElementById("toolWindowBtn");
    const toolCutButton = document.getElementById("toolCutBtn");
    const toolSelectButton = document.getElementById("toolSelectBtn");
    const toolEraseButton = document.getElementById("toolEraseBtn");
    const zoomOutButton = document.getElementById("zoomOutBtn");
    const zoomInButton = document.getElementById("zoomInBtn");
    const zoomResetButton = document.getElementById("zoomResetBtn");
    const floorAddAboveButton = document.getElementById("floorAddAboveBtn");
    const floorMoveUpButton = document.getElementById("floorMoveUpBtn");
    const floorMoveDownButton = document.getElementById("floorMoveDownBtn");
    const floorRemoveButton = document.getElementById("floorRemoveBtn");
    const onionToggleButton = document.getElementById("onionToggleBtn");
    const floorsList = document.getElementById("floorsList");
    const planTitleInput = document.getElementById("planTitleInput");
    const zoomReadout = document.getElementById("zoomReadout");
    const thicknessInput = document.getElementById("thicknessInput");
    const heightInput = document.getElementById("heightInput");
    const joinModeSelect = document.getElementById("joinModeSelect");
    const doorHeightInput = document.getElementById("doorHeightInput");
    const windowGapInput = document.getElementById("windowGapInput");
    const exportPropsToggleButton = document.getElementById("exportPropsToggleBtn");
    const exportPropsPanel = document.getElementById("exportPropsPanel");
    const status = document.getElementById("status");
    const meta = document.getElementById("meta");
    const canvas = document.getElementById("planCanvas");
    const ctx = canvas.getContext("2d");
    const preview3dOverlay = document.getElementById("preview3dOverlay");
    const preview3dCloseButton = document.getElementById("preview3dCloseBtn");
    const preview3dCanvas = document.getElementById("preview3dCanvas");

    function createLevel(name, levelSegments) {
      return {
        name,
        segments: Array.isArray(levelSegments) ? levelSegments : []
      };
    }

    const floors = [createLevel("Level 1", [])];
    let currentLevelIndex = 0;
    let segments = floors[currentLevelIndex].segments;
    let planTitle = "Untitled";
    const LOCAL_PLAN_STORAGE_KEY = "floor-plan-editor.autosave.v1";
    const LOCAL_HISTORY_STORAGE_KEY = "floor-plan-editor.autosave.history.v1";
    const LOCAL_PLAN_SAVE_DELAY_MS = 250;
    let pointerGrid = null;
    let startGrid = null;
    let drawing = false;
    let isPanning = false;
    let isErasingDrag = false;
    let panLastPointer = null;
    let viewOffsetX = 0;
    let viewOffsetY = 0;
    let activeTool = "wall";
    let selectedSegmentIndices = new Set();
    let isMarqueeSelecting = false;
    let marqueeStartWorld = null;
    let marqueeEndWorld = null;
    let marqueeMode = "replace";
    let dragState = null;
    let localSaveTimer = null;
    let undoSnapshot = null;
    let redoSnapshot = null;
    let isExportPropsOpen = false;
    let isSlabPreviewVisible = false;
    let isOnionViewEnabled = true;
    let ellipseForceCircle = false;
    let preview3dRuntime = null;
    let preview3dAnimationId = null;
    let preview3dResizeHandler = null;
    let preview3dViewState = null;

    function getCurrentLevel() {
      return floors[currentLevelIndex];
    }

    function setCurrentLevelIndex(nextIndex) {
      const clamped = Math.max(0, Math.min(floors.length - 1, nextIndex));
      currentLevelIndex = clamped;
      segments = floors[currentLevelIndex].segments;
      selectedSegmentIndices.clear();
      isMarqueeSelecting = false;
      marqueeStartWorld = null;
      marqueeEndWorld = null;
      marqueeMode = "replace";
      dragState = null;
      renderLevelList();
      queueLocalAutosave();
      redraw();
    }

    function buildLevelDefaultName(index) {
      return `Level ${index + 1}`;
    }

    function rebuildLevelNamesIfDefault() {
      for (let i = 0; i < floors.length; i += 1) {
        const defaultLike = /^(Floor|Level)\s+\d+$/i.test(floors[i].name || "");
        if (defaultLike || !floors[i].name) {
          floors[i].name = buildLevelDefaultName(i);
        }
      }
    }

    function renderLevelList() {
      floorsList.innerHTML = "";
      for (let i = floors.length - 1; i >= 0; i -= 1) {
        const floor = floors[i];
        const button = document.createElement("button");
        button.type = "button";
        button.className = `floor-item${i === currentLevelIndex ? " active" : ""}`;
        button.textContent = `${floor.name} (${floor.segments.length})`;
        button.addEventListener("click", () => {
          setCurrentLevelIndex(i);
          status.textContent = `Switched to ${floor.name}.`;
        });
        floorsList.appendChild(button);
      }
      floorRemoveButton.disabled = floors.length <= 1;
      floorMoveUpButton.disabled = floors.length <= 1 || currentLevelIndex <= 0;
      floorMoveDownButton.disabled = floors.length <= 1 || currentLevelIndex >= floors.length - 1;
    }

    function addLevel() {
      const insertAt = floors.length;
      const newFloor = createLevel("", []);
      floors.splice(insertAt, 0, newFloor);
      rebuildLevelNamesIfDefault();
      setCurrentLevelIndex(insertAt);
      status.textContent = `${newFloor.name} created.`;
    }

    function removeCurrentLevel() {
      if (floors.length <= 1) {
        return;
      }
      const removedName = floors[currentLevelIndex].name;
      floors.splice(currentLevelIndex, 1);
      rebuildLevelNamesIfDefault();
      setCurrentLevelIndex(Math.min(currentLevelIndex, floors.length - 1));
      status.textContent = `${removedName} removed.`;
    }

    function moveCurrentLevel(direction) {
      const targetIndex = currentLevelIndex + direction;
      if (targetIndex < 0 || targetIndex >= floors.length) {
        return;
      }

      const floor = floors[currentLevelIndex];
      floors.splice(currentLevelIndex, 1);
      floors.splice(targetIndex, 0, floor);

      rebuildLevelNamesIfDefault();
      setCurrentLevelIndex(targetIndex);
      status.textContent = `${floor.name} moved ${direction < 0 ? "up" : "down"}.`;
    }

    const toolButtons = {
      wall: toolWallButton,
      box: toolBoxButton,
      ellipse: toolEllipseButton,
      halfwall: toolHalfWallButton,
      fakewall: toolFakeWallButton,
      door: toolDoorButton,
      window: toolWindowButton,
      cut: toolCutButton,
      select: toolSelectButton,
      erase: toolEraseButton
    };

    function clampNumber(value, fallback, min) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) {
        return fallback;
      }
      return Math.max(min, parsed);
    }

    function saveUiState() {
      try {
        localStorage.setItem(LOCAL_UI_STORAGE_KEY, JSON.stringify({
          isExportPropsOpen,
          isOnionViewEnabled
        }));
      } catch (error) {
        console.warn("Failed to save UI state.", error);
      }
    }

    function loadUiState() {
      try {
        const raw = localStorage.getItem(LOCAL_UI_STORAGE_KEY);
        if (!raw) {
          isExportPropsOpen = false;
          isOnionViewEnabled = true;
          return;
        }
        const data = JSON.parse(raw);
        isExportPropsOpen = !!(data && data.isExportPropsOpen);
        isOnionViewEnabled = !(data && data.isOnionViewEnabled === false);
      } catch (error) {
        console.warn("Failed to load UI state.", error);
        isExportPropsOpen = false;
        isOnionViewEnabled = true;
      }
    }

    function updateOnionToggleButton() {
      onionToggleButton.textContent = isOnionViewEnabled ? "Onion View: On" : "Onion View: Off";
    }

    function applyExportPropsVisibility() {
      exportPropsPanel.classList.toggle("hidden", !isExportPropsOpen);
      exportPropsToggleButton.setAttribute("aria-expanded", isExportPropsOpen ? "true" : "false");
      exportPropsToggleButton.textContent = isExportPropsOpen ? "Hide Export Properties" : "Show Export Properties";
    }

    function getWallThickness() {
      return clampNumber(thicknessInput.value, 0.125, 0.01);
    }

    function getWallHeight() {
      return clampNumber(heightInput.value, 2.5, 0.25);
    }

    function getDoorHeadHeight() {
      return clampNumber(doorHeightInput.value, DEFAULT_DOOR_HEAD_HEIGHT_UNITS, 0.25);
    }

    function getWindowOpeningGap() {
      return clampNumber(windowGapInput.value, DEFAULT_WINDOW_OPENING_GAP_UNITS, 0.1);
    }

    function normalizePlanTitle(rawTitle) {
      const value = String(rawTitle || "").trim();
      return value || "Untitled";
    }

    function setPlanTitle(nextTitle) {
      planTitle = normalizePlanTitle(nextTitle);
      planTitleInput.value = planTitle;
      document.title = `${planTitle} - Floor Plan Wall GLB Exporter`;
    }

    function formatDateParts(date) {
      const year = String(date.getFullYear());
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return {
        datePart: `${year}-${month}-${day}`,
        timePart: `${hour}-${minute}`
      };
    }

    function sanitizeFilenamePart(value) {
      return String(value || "")
        .replace(/[<>:"/\\|?*\x00-\x1F]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/[.\s]+$/g, "")
        || "Untitled";
    }

    function gridToCanvas(point) {
      return { x: point.x * gridPx + viewOffsetX, y: point.y * gridPx + viewOffsetY };
    }

    function canvasToGrid(x, y) {
      return {
        x: Math.round((x - viewOffsetX) / gridPx),
        y: Math.round((y - viewOffsetY) / gridPx)
      };
    }

    function canvasToWorld(x, y) {
      return {
        x: (x - viewOffsetX) / gridPx,
        y: (y - viewOffsetY) / gridPx
      };
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      return {
        x: (event.clientX - rect.left) * sx,
        y: (event.clientY - rect.top) * sy
      };
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 1;

      const startX = Math.floor((0 - viewOffsetX) / gridPx);
      const endX = Math.ceil((canvas.width - viewOffsetX) / gridPx);
      for (let gx = startX; gx <= endX; gx += 1) {
        const x = gx * gridPx + viewOffsetX;
        ctx.strokeStyle = gx % 4 === 0 ? "#c7d3e6" : "#e3eaf5";
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, canvas.height);
        ctx.stroke();
      }

      const startY = Math.floor((0 - viewOffsetY) / gridPx);
      const endY = Math.ceil((canvas.height - viewOffsetY) / gridPx);
      for (let gy = startY; gy <= endY; gy += 1) {
        const y = gy * gridPx + viewOffsetY;
        ctx.strokeStyle = gy % 4 === 0 ? "#c7d3e6" : "#e3eaf5";
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(canvas.width, y + 0.5);
        ctx.stroke();
      }

      const originCanvas = gridToCanvas({ x: 0, y: 0 });
      const cx = originCanvas.x;
      const cy = originCanvas.y;
      const markerHalf = 10;
      const minorMarkerHalf = 5;
      const markerStepGrid = Math.max(1, Math.round(5 / GRID_SIZE_UNITS));

      ctx.save();
      ctx.strokeStyle = "#3b82f6";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - markerHalf, cy + 0.5);
      ctx.lineTo(cx + markerHalf, cy + 0.5);
      ctx.moveTo(cx + 0.5, cy - markerHalf);
      ctx.lineTo(cx + 0.5, cy + markerHalf);
      ctx.stroke();

      ctx.strokeStyle = "#60a5fa";
      ctx.lineWidth = 1.2;

      const minGX = Math.floor((0 - viewOffsetX) / gridPx);
      const maxGX = Math.ceil((canvas.width - viewOffsetX) / gridPx);
      const minGY = Math.floor((0 - viewOffsetY) / gridPx);
      const maxGY = Math.ceil((canvas.height - viewOffsetY) / gridPx);
      const startMarkerGX = Math.ceil(minGX / markerStepGrid) * markerStepGrid;
      const startMarkerGY = Math.ceil(minGY / markerStepGrid) * markerStepGrid;

      for (let gx = startMarkerGX; gx <= maxGX; gx += markerStepGrid) {
        for (let gy = startMarkerGY; gy <= maxGY; gy += markerStepGrid) {
          if (gx === 0 && gy === 0) {
            continue;
          }
          const p = gridToCanvas({ x: gx, y: gy });
          ctx.beginPath();
          ctx.moveTo(p.x - minorMarkerHalf, p.y + 0.5);
          ctx.lineTo(p.x + minorMarkerHalf, p.y + 0.5);
          ctx.moveTo(p.x + 0.5, p.y - minorMarkerHalf);
          ctx.lineTo(p.x + 0.5, p.y + minorMarkerHalf);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function getSegmentColor(seg) {
      if (seg.type === "door") {
        return "#d97706";
      }
      if (seg.type === "window") {
        return "#0891b2";
      }
      if (seg.type === "halfwall") {
        return "#0e7490";
      }
      if (seg.type === "fakewall") {
        return "#cbd5e1";
      }
      return "#0f1722";
    }

    function drawFloorSegments(floorSegments, options) {
      const alpha = options && Number.isFinite(options.alpha) ? options.alpha : 1;
      const tintColor = options && options.tintColor ? options.tintColor : null;
      const isCurrent = !!(options && options.isCurrent);

      ctx.save();
      ctx.globalAlpha = alpha;

      for (let i = 0; i < floorSegments.length; i += 1) {
        const seg = floorSegments[i];
        ctx.lineWidth = isCurrent && selectedSegmentIndices.has(i) ? 4 : 3;
        ctx.strokeStyle = tintColor || getSegmentColor(seg);
        const a = gridToCanvas(seg.a);
        const b = gridToCanvas(seg.b);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawSegments() {
      if (!isOnionViewEnabled) {
        drawFloorSegments(segments, { alpha: 1, tintColor: null, isCurrent: true });
        return;
      }

      const below = floors[currentLevelIndex - 1];
      const above = floors[currentLevelIndex + 1];

      if (below) {
        drawFloorSegments(below.segments, { alpha: 0.8, tintColor: "#9ca3af", isCurrent: false });
      }

      drawFloorSegments(segments, { alpha: 1, tintColor: null, isCurrent: true });

      if (above) {
        drawFloorSegments(above.segments, { alpha: 0.7, tintColor: "#93c5fd", isCurrent: false });
      }
    }

    function computeSlabPolygonsForLevel(levelSegments) {
      if (!Array.isArray(levelSegments) || levelSegments.length === 0) {
        return [];
      }

      const slabBoundaryTypes = new Set(["wall", "door", "window", "halfwall"]);
      const worldSegments = [];

      for (let i = 0; i < levelSegments.length; i += 1) {
        const seg = levelSegments[i];
        if (!seg || !seg.a || !seg.b || !slabBoundaryTypes.has(seg.type || "wall")) {
          continue;
        }

        const ax = Number(seg.a.x);
        const ay = Number(seg.a.y);
        const bx = Number(seg.b.x);
        const by = Number(seg.b.y);
        if (![ax, ay, bx, by].every(Number.isFinite)) {
          continue;
        }
        if (Math.hypot(bx - ax, by - ay) < 1e-8) {
          continue;
        }

        worldSegments.push({
          a: { x: ax, z: ay },
          b: { x: bx, z: by },
          type: seg.type || "wall"
        });
      }

      if (worldSegments.length < 3) {
        return [];
      }

      const split = splitSegmentsAtIntersections(worldSegments);
      return extractBoundedFacesFromSegments(split);
    }

    function drawSlabPreview() {
      if (!isSlabPreviewVisible) {
        return;
      }

      const polygons = computeSlabPolygonsForLevel(segments);
      if (polygons.length === 0) {
        return;
      }

      ctx.save();
      ctx.fillStyle = "rgba(16,185,129,0.16)";
      ctx.strokeStyle = "rgba(16,185,129,0.62)";
      ctx.lineWidth = 1.5;

      for (let i = 0; i < polygons.length; i += 1) {
        const poly = polygons[i];
        if (!Array.isArray(poly) || poly.length < 3) {
          continue;
        }

        ctx.beginPath();
        for (let j = 0; j < poly.length; j += 1) {
          const p = gridToCanvas({ x: poly[j].x, y: poly[j].z });
          if (j === 0) {
            ctx.moveTo(p.x, p.y);
          } else {
            ctx.lineTo(p.x, p.y);
          }
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Dashed outline suggests the paired ceiling surface in top view.
        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = "rgba(37,99,235,0.75)";
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore();
    }

    function buildEllipsePoints(center, target, forceCircle) {
      let rx = Math.abs(target.x - center.x);
      let ry = Math.abs(target.y - center.y);

      if (forceCircle) {
        const radius = Math.max(rx, ry);
        rx = radius;
        ry = radius;
      }

      if (rx < 1e-6 || ry < 1e-6) {
        return [];
      }

      // Increase node count as ellipse radius grows for smoother large shapes.
      const approxCircumference = 2 * Math.PI * Math.sqrt((rx * rx + ry * ry) * 0.5);
      const nodeCount = Math.max(16, Math.min(256, Math.round(approxCircumference * 2)));
      const rawPoints = [];

      for (let i = 0; i < nodeCount; i += 1) {
        const t = (i / nodeCount) * Math.PI * 2;
        rawPoints.push({
          x: center.x + Math.cos(t) * rx,
          y: center.y + Math.sin(t) * ry
        });
      }

      const points = [];
      const seen = new Set();
      for (let i = 0; i < rawPoints.length; i += 1) {
        const snapped = {
          x: Math.round(rawPoints[i].x),
          y: Math.round(rawPoints[i].y)
        };
        const key = `${snapped.x},${snapped.y}`;
        if (seen.has(key)) {
          continue;
        }
        seen.add(key);
        points.push(snapped);
      }

      if (points.length >= 2) {
        const first = points[0];
        const last = points[points.length - 1];
        if (first.x === last.x && first.y === last.y) {
          points.pop();
        }
      }

      return points;
    }

    function mergeCollinearLoopPoints(points) {
      if (!Array.isArray(points) || points.length < 3) {
        return Array.isArray(points) ? points.slice() : [];
      }

      const merged = points.slice();
      const crossTolerance = 1e-9;
      let changed = true;

      while (changed && merged.length >= 3) {
        changed = false;

        for (let i = 0; i < merged.length; i += 1) {
          const prev = merged[(i - 1 + merged.length) % merged.length];
          const curr = merged[i];
          const next = merged[(i + 1) % merged.length];

          const v1x = curr.x - prev.x;
          const v1y = curr.y - prev.y;
          const v2x = next.x - curr.x;
          const v2y = next.y - curr.y;
          const cross = v1x * v2y - v1y * v2x;

          // Remove middle points that keep the same straight direction.
          if (Math.abs(cross) <= crossTolerance) {
            merged.splice(i, 1);
            changed = true;
            break;
          }
        }
      }

      return merged;
    }

    function addEllipseAsWalls(center, target, forceCircle) {
      const points = mergeCollinearLoopPoints(buildEllipsePoints(center, target, forceCircle));
      if (points.length < 3) {
        return 0;
      }

      const beforeCount = segments.length;
      for (let i = 0; i < points.length; i += 1) {
        const a = points[i];
        const b = points[(i + 1) % points.length];
        addWallSegmentWithCut(a, b);
      }

      return Math.max(0, segments.length - beforeCount);
    }

    function drawPreview() {
      if (drawing && startGrid && pointerGrid && (activeTool === "wall" || activeTool === "door" || activeTool === "window" || activeTool === "halfwall" || activeTool === "fakewall" || activeTool === "box" || activeTool === "ellipse")) {
        if (activeTool === "ellipse") {
          const points = buildEllipsePoints(startGrid, pointerGrid, ellipseForceCircle);
          if (points.length >= 3) {
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#1479ff";
            ctx.beginPath();
            for (let i = 0; i < points.length; i += 1) {
              const p = gridToCanvas(points[i]);
              if (i === 0) {
                ctx.moveTo(p.x, p.y);
              } else {
                ctx.lineTo(p.x, p.y);
              }
            }
            ctx.closePath();
            ctx.stroke();
          }
        } else if (activeTool === "box") {
          const minX = Math.min(startGrid.x, pointerGrid.x);
          const maxX = Math.max(startGrid.x, pointerGrid.x);
          const minY = Math.min(startGrid.y, pointerGrid.y);
          const maxY = Math.max(startGrid.y, pointerGrid.y);
          const corners = [
            { x: minX, y: minY },
            { x: maxX, y: minY },
            { x: maxX, y: maxY },
            { x: minX, y: maxY }
          ];

          ctx.lineWidth = 3;
          ctx.strokeStyle = "#1479ff";
          for (let i = 0; i < 4; i += 1) {
            const a = gridToCanvas(corners[i]);
            const b = gridToCanvas(corners[(i + 1) % 4]);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        } else {
          const a = gridToCanvas(startGrid);
          const target = activeTool === "door" ? projectDoorEndpoint(startGrid, pointerGrid) : pointerGrid;
          const b = gridToCanvas(target);
          ctx.lineWidth = 3;
          if (activeTool === "door") {
            ctx.strokeStyle = "#d97706";
          } else if (activeTool === "window") {
            ctx.strokeStyle = "#0891b2";
          } else if (activeTool === "halfwall") {
            ctx.strokeStyle = "#0e7490";
          } else if (activeTool === "fakewall") {
            ctx.strokeStyle = "#cbd5e1";
          } else {
            ctx.strokeStyle = "#1479ff";
          }
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }

      if (pointerGrid) {
        const p = gridToCanvas(pointerGrid);
        ctx.fillStyle = "#1479ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      if (activeTool === "select" && isMarqueeSelecting && marqueeStartWorld && marqueeEndWorld) {
        const a = gridToCanvas(marqueeStartWorld);
        const b = gridToCanvas(marqueeEndWorld);
        const x = Math.min(a.x, b.x);
        const y = Math.min(a.y, b.y);
        const w = Math.abs(a.x - b.x);
        const h = Math.abs(a.y - b.y);

        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = "#1479ff";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x, y, w, h);
        ctx.fillStyle = "rgba(20,121,255,0.08)";
        ctx.fillRect(x, y, w, h);
        ctx.restore();
      }

      if (activeTool === "select" && selectedSegmentIndices.size === 1) {
        const index = Array.from(selectedSegmentIndices)[0];
        const seg = segments[index];
        if (seg) {
          const a = gridToCanvas(seg.a);
          const b = gridToCanvas(seg.b);
          ctx.save();
          ctx.fillStyle = "#1479ff";
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(a.x, a.y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function redraw() {
      drawGrid();
      drawSegments();
      drawSlabPreview();
      drawPreview();
      updateMeta();
      updateZoomReadout();
    }

    function updateSlabPreviewToggleButton() {
      slabPreviewToggleButton.textContent = isSlabPreviewVisible ? "Hide Slab Preview" : "Preview Slabs";
    }

    function updateMeta() {
      const wallHeight = getWallHeight().toFixed(2);
      const wallThickness = getWallThickness().toFixed(2);
      const doorHeight = getDoorHeadHeight().toFixed(2);
      const windowGap = getWindowOpeningGap().toFixed(2);
      const wallCount = segments.filter(seg => seg.type === "wall").length;
      const fakeWallCount = segments.filter(seg => seg.type === "fakewall").length;
      const halfWallCount = segments.filter(seg => seg.type === "halfwall").length;
      const doorCount = segments.filter(seg => seg.type === "door").length;
      const windowCount = segments.filter(seg => seg.type === "window").length;
      meta.textContent = `Grid: ${GRID_SIZE_UNITS} | Height: ${wallHeight} | Thickness: ${wallThickness} | Door Height: ${doorHeight} | Window Gap: ${windowGap} | Join: ${joinModeSelect.value} | Tool: ${activeTool} | Level: ${currentLevelIndex + 1}/${floors.length} | Walls: ${wallCount} | Fake Walls: ${fakeWallCount} | Half Walls: ${halfWallCount} | Doors: ${doorCount} | Windows: ${windowCount}`;
    }

    function getDoorWidthGrid() {
      return DOOR_WIDTH_UNITS / GRID_SIZE_UNITS;
    }

    function updateZoomReadout() {
      const percent = Math.round((gridPx / DEFAULT_GRID_PX) * 100);
      zoomReadout.textContent = `${percent}%`;
    }

    function setCanvasZoom(nextGridPx) {
      gridPx = Math.max(MIN_GRID_PX, Math.min(MAX_GRID_PX, nextGridPx));
      queueLocalAutosave();
      redraw();
    }

    function setCanvasZoomAtPoint(nextGridPx, anchorCanvasX, anchorCanvasY) {
      const oldGridPx = gridPx;
      const clamped = Math.max(MIN_GRID_PX, Math.min(MAX_GRID_PX, nextGridPx));
      if (Math.abs(clamped - oldGridPx) < 1e-9) {
        return;
      }

      const worldX = (anchorCanvasX - viewOffsetX) / oldGridPx;
      const worldY = (anchorCanvasY - viewOffsetY) / oldGridPx;

      gridPx = clamped;
      viewOffsetX = anchorCanvasX - worldX * gridPx;
      viewOffsetY = anchorCanvasY - worldY * gridPx;
      queueLocalAutosave();
      redraw();
    }

    function clonePoint(point) {
      return { x: point.x, y: point.y };
    }

    function cloneProjectData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function captureCurrentProjectSnapshot() {
      return cloneProjectData(serializeProject());
    }

    function recordUndoSnapshot(snapshot) {
      undoSnapshot = cloneProjectData(snapshot || serializeProject());
      redoSnapshot = null;
    }

    function saveHistoryToLocalStorage() {
      try {
        const payload = {
          undoSnapshot,
          redoSnapshot
        };
        localStorage.setItem(LOCAL_HISTORY_STORAGE_KEY, JSON.stringify(payload));
      } catch (error) {
        console.warn("Failed to save undo/redo history.", error);
      }
    }

    function loadHistoryFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LOCAL_HISTORY_STORAGE_KEY);
        if (!raw) {
          undoSnapshot = null;
          redoSnapshot = null;
          return;
        }
        const parsed = JSON.parse(raw);
        undoSnapshot = parsed && parsed.undoSnapshot ? cloneProjectData(parsed.undoSnapshot) : null;
        redoSnapshot = parsed && parsed.redoSnapshot ? cloneProjectData(parsed.redoSnapshot) : null;
      } catch (error) {
        console.warn("Failed to load undo/redo history.", error);
        undoSnapshot = null;
        redoSnapshot = null;
      }
    }

    function restoreProjectSnapshot(snapshot) {
      if (!snapshot) {
        return false;
      }
      applyProjectData(cloneProjectData(snapshot));
      queueLocalAutosave();
      redraw();
      return true;
    }

    function performUndo() {
      if (!undoSnapshot) {
        return false;
      }
      const current = captureCurrentProjectSnapshot();
      const target = undoSnapshot;
      undoSnapshot = null;
      redoSnapshot = current;
      return restoreProjectSnapshot(target);
    }

    function performRedo() {
      if (!redoSnapshot) {
        return false;
      }
      const current = captureCurrentProjectSnapshot();
      const target = redoSnapshot;
      redoSnapshot = null;
      undoSnapshot = current;
      return restoreProjectSnapshot(target);
    }

    function didDragChangeGeometry(drag) {
      if (!drag) {
        return false;
      }

      if (drag.mode === "move-endpoint") {
        const seg = segments[drag.index];
        if (!seg) {
          return false;
        }
        const p = drag.endpoint === "a" ? seg.a : seg.b;
        return Math.hypot(p.x - drag.startPoint.x, p.y - drag.startPoint.y) > 1e-9;
      }

      if (drag.mode === "move-selection" && Array.isArray(drag.originals)) {
        for (let i = 0; i < drag.originals.length; i += 1) {
          const original = drag.originals[i];
          const seg = segments[original.index];
          if (!seg) {
            continue;
          }
          if (Math.hypot(seg.a.x - original.a.x, seg.a.y - original.a.y) > 1e-9) {
            return true;
          }
          if (Math.hypot(seg.b.x - original.b.x, seg.b.y - original.b.y) > 1e-9) {
            return true;
          }
        }
      }

      return false;
    }

    function setTool(nextTool) {
      activeTool = nextTool;
      drawing = false;
      isErasingDrag = false;
      ellipseForceCircle = false;
      startGrid = null;
      selectedSegmentIndices.clear();
      isMarqueeSelecting = false;
      marqueeStartWorld = null;
      marqueeEndWorld = null;
      marqueeMode = "replace";
      dragState = null;

      Object.keys(toolButtons).forEach(key => {
        toolButtons[key].classList.toggle("active", key === activeTool);
      });

      status.textContent = `Tool changed to ${activeTool}.`;
      redraw();
    }

    function cycleToolGroup(group, groupName) {
      const currentIndex = group.indexOf(activeTool);
      const nextTool = currentIndex >= 0 ? group[(currentIndex + 1) % group.length] : group[0];
      setTool(nextTool);
      status.textContent = `${groupName}: ${nextTool}`;
      redraw();
    }

    function eraseAtPoint(point) {
      const index = findNearestSegmentIndex(point, () => true);
      if (index >= 0) {
        recordUndoSnapshot();
        segments.splice(index, 1);
        selectedSegmentIndices.clear();
        queueLocalAutosave();
        return true;
      }
      return false;
    }

    function deleteSelectedSegments() {
      if (selectedSegmentIndices.size === 0) {
        return 0;
      }

      recordUndoSnapshot();

      const indices = Array.from(selectedSegmentIndices).sort((a, b) => b - a);
      for (let i = 0; i < indices.length; i += 1) {
        if (indices[i] >= 0 && indices[i] < segments.length) {
          segments.splice(indices[i], 1);
        }
      }

      const removedCount = indices.length;
      selectedSegmentIndices.clear();
      isMarqueeSelecting = false;
      marqueeStartWorld = null;
      marqueeEndWorld = null;
      marqueeMode = "replace";
      dragState = null;
      queueLocalAutosave();
      return removedCount;
    }

    function getRectFromWorldPoints(a, b) {
      return {
        minX: Math.min(a.x, b.x),
        maxX: Math.max(a.x, b.x),
        minY: Math.min(a.y, b.y),
        maxY: Math.max(a.y, b.y)
      };
    }

    function pointInRect(point, rect) {
      return point.x >= rect.minX && point.x <= rect.maxX && point.y >= rect.minY && point.y <= rect.maxY;
    }

    function segmentIntersectsRect(seg, rect) {
      if (pointInRect(seg.a, rect) || pointInRect(seg.b, rect)) {
        return true;
      }

      const r0 = { x: rect.minX, y: rect.minY };
      const r1 = { x: rect.maxX, y: rect.minY };
      const r2 = { x: rect.maxX, y: rect.maxY };
      const r3 = { x: rect.minX, y: rect.maxY };
      const edges = [[r0, r1], [r1, r2], [r2, r3], [r3, r0]];
      const eps = 1e-6;

      for (let i = 0; i < edges.length; i += 1) {
        const hit = segmentIntersectionParams2D(seg.a, seg.b, edges[i][0], edges[i][1]);
        if (!hit) {
          continue;
        }
        if (hit.t >= -eps && hit.t <= 1 + eps && hit.u >= -eps && hit.u <= 1 + eps) {
          return true;
        }
      }

      return false;
    }

    function collectSegmentsInMarquee(a, b) {
      const rect = getRectFromWorldPoints(a, b);
      const indices = [];
      for (let i = 0; i < segments.length; i += 1) {
        if (segmentIntersectsRect(segments[i], rect)) {
          indices.push(i);
        }
      }
      return indices;
    }

    function getSingleSelectedEndpointHit(pointerWorld) {
      if (selectedSegmentIndices.size !== 1) {
        return null;
      }
      const index = Array.from(selectedSegmentIndices)[0];
      const seg = segments[index];
      if (!seg) {
        return null;
      }

      const toleranceWorld = Math.max(0.2, 10 / Math.max(gridPx, 1));
      const dA = Math.hypot(pointerWorld.x - seg.a.x, pointerWorld.y - seg.a.y);
      const dB = Math.hypot(pointerWorld.x - seg.b.x, pointerWorld.y - seg.b.y);
      const minD = Math.min(dA, dB);

      if (minD > toleranceWorld) {
        return null;
      }

      return {
        index,
        endpoint: dA <= dB ? "a" : "b",
        startPoint: clonePoint(dA <= dB ? seg.a : seg.b)
      };
    }

    function tryMergeMovedEndpoint(drag) {
      if (!drag || drag.mode !== "move-endpoint") {
        return false;
      }

      const seg = segments[drag.index];
      if (!seg) {
        return false;
      }

      const movedPoint = drag.endpoint === "a" ? seg.a : seg.b;
      const endpointSnapTolerance = Math.max(1e-6, 4 / Math.max(gridPx, 1));
      let otherIndex = -1;

      function isSamePoint(p, q) {
        return Math.hypot(p.x - q.x, p.y - q.y) <= endpointSnapTolerance;
      }

      function normalizedDirection(s) {
        const dx = s.b.x - s.a.x;
        const dy = s.b.y - s.a.y;
        const len = Math.hypot(dx, dy);
        if (len < 1e-8) {
          return null;
        }
        return { x: dx / len, y: dy / len };
      }

      for (let i = 0; i < segments.length; i += 1) {
        if (i === drag.index) {
          continue;
        }
        const candidate = segments[i];
        if (!candidate || candidate.type !== seg.type) {
          continue;
        }
        if (isSamePoint(candidate.a, movedPoint) || isSamePoint(candidate.b, movedPoint)) {
          otherIndex = i;
          break;
        }
      }

      if (otherIndex < 0) {
        return false;
      }

      const other = segments[otherIndex];
      const dirA = normalizedDirection(seg);
      const dirB = normalizedDirection(other);
      if (!dirA || !dirB) {
        return false;
      }

      const cross = dirA.x * dirB.y - dirA.y * dirB.x;
      const dot = dirA.x * dirB.x + dirA.y * dirB.y;
      if (Math.abs(cross) > 1e-4 || Math.abs(dot) < 0.999) {
        return false;
      }

      const allPoints = [seg.a, seg.b, other.a, other.b];
      let minT = Infinity;
      let maxT = -Infinity;
      let minPoint = null;
      let maxPoint = null;

      for (let i = 0; i < allPoints.length; i += 1) {
        const p = allPoints[i];
        const t = p.x * dirA.x + p.y * dirA.y;
        if (t < minT) {
          minT = t;
          minPoint = p;
        }
        if (t > maxT) {
          maxT = t;
          maxPoint = p;
        }
      }

      if (!minPoint || !maxPoint || Math.hypot(maxPoint.x - minPoint.x, maxPoint.y - minPoint.y) < 1e-6) {
        return false;
      }

      const keepIndex = drag.index;
      const removeIndex = otherIndex;
      seg.a = { x: minPoint.x, y: minPoint.y };
      seg.b = { x: maxPoint.x, y: maxPoint.y };
      segments.splice(removeIndex, 1);

      let finalIndex = keepIndex;
      if (removeIndex < keepIndex) {
        finalIndex = keepIndex - 1;
      }

      selectedSegmentIndices.clear();
      if (finalIndex >= 0 && finalIndex < segments.length) {
        selectedSegmentIndices.add(finalIndex);
      }
      queueLocalAutosave();
      return true;
    }

    function projectDoorEndpoint(start, pointer) {
      const dx = pointer.x - start.x;
      const dy = pointer.y - start.y;
      const len = Math.hypot(dx, dy);
      const doorWidthGrid = getDoorWidthGrid();

      if (len < 1e-6) {
        return { x: start.x + doorWidthGrid, y: start.y };
      }

      const scale = doorWidthGrid / len;
      return {
        x: start.x + dx * scale,
        y: start.y + dy * scale
      };
    }

    function pointToSegmentDistance(point, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const apx = point.x - a.x;
      const apy = point.y - a.y;
      const lenSq = abx * abx + aby * aby;

      if (lenSq < 1e-8) {
        return Math.hypot(apx, apy);
      }

      const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / lenSq));
      const cx = a.x + abx * t;
      const cy = a.y + aby * t;
      return Math.hypot(point.x - cx, point.y - cy);
    }

    function findNearestSegmentIndex(point, filterFn) {
      const maxDist = 0.4;
      let bestIndex = -1;
      let bestDistance = Infinity;

      for (let i = 0; i < segments.length; i += 1) {
        const seg = segments[i];
        if (filterFn && !filterFn(seg)) {
          continue;
        }

        const d = pointToSegmentDistance(point, seg.a, seg.b);
        if (d <= maxDist && d < bestDistance) {
          bestDistance = d;
          bestIndex = i;
        }
      }

      return bestIndex;
    }

    function pushSegment(type, a, b) {
      if (a.x === b.x && a.y === b.y) {
        return;
      }
      segments.push({
        a: { x: a.x, y: a.y },
        b: { x: b.x, y: b.y },
        type
      });
    }

    function cutOverlappingWallSegments(newA, newB) {
      const dir = { x: newB.x - newA.x, y: newB.y - newA.y };
      const len = Math.hypot(dir.x, dir.y);
      if (len < 1e-8) {
        return;
      }

      const u = { x: dir.x / len, y: dir.y / len };
      const eps = 1e-6;
      const tol = 1e-4;

      function relProj(p, base) {
        return (p.x - base.x) * u.x + (p.y - base.y) * u.y;
      }

      function distToLine(p, base) {
        const px = p.x - base.x;
        const py = p.y - base.y;
        const perp = Math.abs(px * (-u.y) + py * u.x);
        return perp;
      }

      for (let i = segments.length - 1; i >= 0; i -= 1) {
        const seg = segments[i];
        if (seg.type !== "wall") {
          continue;
        }

        const sdir = { x: seg.b.x - seg.a.x, y: seg.b.y - seg.a.y };
        const slen = Math.hypot(sdir.x, sdir.y);
        if (slen < 1e-8) {
          continue;
        }

        const su = { x: sdir.x / slen, y: sdir.y / slen };
        const parallel = Math.abs(u.x * su.x + u.y * su.y);
        if (parallel < 0.999) {
          continue;
        }

        if (distToLine(seg.a, newA) > tol || distToLine(seg.b, newA) > tol) {
          continue;
        }

        const e0 = relProj(seg.a, newA);
        const e1 = relProj(seg.b, newA);
        const n0 = 0;
        const n1 = len;

        const eMin = Math.min(e0, e1);
        const eMax = Math.max(e0, e1);
        const oMin = Math.max(eMin, n0);
        const oMax = Math.min(eMax, n1);

        if (oMax - oMin <= eps) {
          continue;
        }

        segments.splice(i, 1);

        function pointAt(t) {
          return { x: newA.x + u.x * t, y: newA.y + u.y * t };
        }

        if (oMin - eMin > eps) {
          pushSegment("wall", pointAt(eMin), pointAt(oMin));
        }
        if (eMax - oMax > eps) {
          pushSegment("wall", pointAt(oMax), pointAt(eMax));
        }
      }
    }

    function addWallSegmentWithCut(a, b) {
      splitExistingSegmentsAtIntersections(a, b);
      cutOverlappingWallSegments(a, b);
      pushSegment("wall", a, b);
    }

    function segmentIntersectionParams2D(a0, a1, b0, b1) {
      const eps = 1e-9;
      const r = { x: a1.x - a0.x, y: a1.y - a0.y };
      const s = { x: b1.x - b0.x, y: b1.y - b0.y };
      const rxs = r.x * s.y - r.y * s.x;
      if (Math.abs(rxs) < eps) {
        return null;
      }

      const qp = { x: b0.x - a0.x, y: b0.y - a0.y };
      const t = (qp.x * s.y - qp.y * s.x) / rxs;
      const u = (qp.x * r.y - qp.y * r.x) / rxs;
      return { t, u };
    }

    function splitExistingSegmentsAtIntersections(newA, newB) {
      const eps = 1e-6;
      const cuttable = new Set(["wall", "halfwall", "fakewall", "door", "window"]);

      for (let i = segments.length - 1; i >= 0; i -= 1) {
        const seg = segments[i];
        if (!cuttable.has(seg.type || "wall")) {
          continue;
        }

        const hit = segmentIntersectionParams2D(newA, newB, seg.a, seg.b);
        if (!hit) {
          continue;
        }

        if (hit.t < -eps || hit.t > 1 + eps) {
          continue;
        }
        if (hit.u <= eps || hit.u >= 1 - eps) {
          continue;
        }

        const ip = {
          x: seg.a.x + (seg.b.x - seg.a.x) * hit.u,
          y: seg.a.y + (seg.b.y - seg.a.y) * hit.u
        };

        segments.splice(i, 1);
        pushSegment(seg.type || "wall", seg.a, ip);
        pushSegment(seg.type || "wall", ip, seg.b);
      }
    }

    function addSegmentWithCuts(type, a, b) {
      splitExistingSegmentsAtIntersections(a, b);
      pushSegment(type, a, b);
      queueLocalAutosave();
    }

    function projectPointToSegment2D(point, a, b) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const lenSq = abx * abx + aby * aby;
      if (lenSq < 1e-12) {
        return { t: 0, x: a.x, y: a.y };
      }
      const t = ((point.x - a.x) * abx + (point.y - a.y) * aby) / lenSq;
      return {
        t,
        x: a.x + abx * t,
        y: a.y + aby * t
      };
    }

    function carveDoorIntoWall(doorStart, doorEnd) {
      const doorDir = { x: doorEnd.x - doorStart.x, y: doorEnd.y - doorStart.y };
      const doorLen = Math.hypot(doorDir.x, doorDir.y);
      if (doorLen < 1e-6) {
        return null;
      }

      const doorDirN = { x: doorDir.x / doorLen, y: doorDir.y / doorLen };
      const doorMid = { x: (doorStart.x + doorEnd.x) * 0.5, y: (doorStart.y + doorEnd.y) * 0.5 };

      let best = null;

      for (let i = 0; i < segments.length; i += 1) {
        const seg = segments[i];
        if (seg.type !== "wall") {
          continue;
        }

        const wallDir = { x: seg.b.x - seg.a.x, y: seg.b.y - seg.a.y };
        const wallLen = Math.hypot(wallDir.x, wallDir.y);
        if (wallLen < 1e-6) {
          continue;
        }

        const wallDirN = { x: wallDir.x / wallLen, y: wallDir.y / wallLen };
        const parallel = Math.abs(doorDirN.x * wallDirN.x + doorDirN.y * wallDirN.y);
        if (parallel < 0.98) {
          continue;
        }

        const pm = projectPointToSegment2D(doorMid, seg.a, seg.b);
        const distMid = Math.hypot(doorMid.x - pm.x, doorMid.y - pm.y);
        if (distMid > 0.25) {
          continue;
        }

        const p0 = projectPointToSegment2D(doorStart, seg.a, seg.b);
        const p1 = projectPointToSegment2D(doorEnd, seg.a, seg.b);
        let t0 = p0.t;
        let t1 = p1.t;
        if (t0 > t1) {
          const tmp = t0;
          t0 = t1;
          t1 = tmp;
        }

        if (t1 <= 0.001 || t0 >= 0.999) {
          continue;
        }

        const clampedT0 = Math.max(0, Math.min(1, t0));
        const clampedT1 = Math.max(0, Math.min(1, t1));
        if (clampedT1 - clampedT0 < 1e-4) {
          continue;
        }

        if (!best || distMid < best.distMid) {
          best = { index: i, seg, distMid, t0: clampedT0, t1: clampedT1 };
        }
      }

      if (!best) {
        return null;
      }

      const seg = best.seg;
      const ab = { x: seg.b.x - seg.a.x, y: seg.b.y - seg.a.y };
      const cutA = { x: seg.a.x + ab.x * best.t0, y: seg.a.y + ab.y * best.t0 };
      const cutB = { x: seg.a.x + ab.x * best.t1, y: seg.a.y + ab.y * best.t1 };

      segments.splice(best.index, 1);
      pushSegment("wall", seg.a, cutA);
      pushSegment("wall", cutB, seg.b);
      queueLocalAutosave();

      return { a: cutA, b: cutB };
    }

    function splitSegmentAtPoint(segmentIndex, worldPoint) {
      if (segmentIndex < 0 || segmentIndex >= segments.length) {
        return false;
      }

      const seg = segments[segmentIndex];
      const projection = projectPointToSegment2D(worldPoint, seg.a, seg.b);
      const t = Math.max(0, Math.min(1, projection.t));
      const eps = 1e-4;
      if (t <= eps || t >= 1 - eps) {
        return false;
      }

      const splitPoint = {
        x: seg.a.x + (seg.b.x - seg.a.x) * t,
        y: seg.a.y + (seg.b.y - seg.a.y) * t
      };

      segments.splice(segmentIndex, 1);
      pushSegment(seg.type, seg.a, splitPoint);
      pushSegment(seg.type, splitPoint, seg.b);
      queueLocalAutosave();
      return true;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function serializeProject() {
      const serializedFloors = floors.map((floor, index) => ({
        name: floor.name || buildLevelDefaultName(index),
        segments: floor.segments.map(seg => ({
          a: { x: seg.a.x, y: seg.a.y },
          b: { x: seg.b.x, y: seg.b.y },
          type: seg.type || "wall"
        }))
      }));

      return {
        version: 2,
        title: planTitle,
        gridSizeUnits: GRID_SIZE_UNITS,
        settings: {
          thickness: getWallThickness(),
          height: getWallHeight(),
          joinMode: joinModeSelect.value,
          doorHeight: getDoorHeadHeight(),
          windowGap: getWindowOpeningGap()
        },
        view: {
          gridPx,
          viewOffsetX,
          viewOffsetY
        },
        currentFloorIndex: currentLevelIndex,
        floors: serializedFloors,
        // Kept for backwards compatibility with older workflows that read only top-level segments.
        segments: serializedFloors[0] ? serializedFloors[0].segments : []
      };
    }

    function saveProjectToLocalStorage() {
      try {
        const text = JSON.stringify(serializeProject());
        localStorage.setItem(LOCAL_PLAN_STORAGE_KEY, text);
        saveHistoryToLocalStorage();
      } catch (error) {
        console.warn("Failed to autosave project to local storage.", error);
      }
    }

    function queueLocalAutosave() {
      if (localSaveTimer) {
        clearTimeout(localSaveTimer);
      }
      localSaveTimer = setTimeout(() => {
        localSaveTimer = null;
        saveProjectToLocalStorage();
      }, LOCAL_PLAN_SAVE_DELAY_MS);
    }

    function loadProjectFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LOCAL_PLAN_STORAGE_KEY);
        if (!raw) {
          return false;
        }
        const data = JSON.parse(raw);
        applyProjectData(data);
        loadHistoryFromLocalStorage();
        setTool("select");
        return true;
      } catch (error) {
        console.warn("Failed to load autosaved project from local storage.", error);
        return false;
      }
    }

    function applyProjectData(data) {
      if (!data) {
        throw new Error("Invalid plan file.");
      }

      const allowedTypes = new Set(["wall", "halfwall", "fakewall", "door", "window"]);
      const sanitizeSegments = rawSegments => {
        const out = [];
        if (!Array.isArray(rawSegments)) {
          return out;
        }
        for (let i = 0; i < rawSegments.length; i += 1) {
          const seg = rawSegments[i];
          if (!seg || !seg.a || !seg.b) {
            continue;
          }

          const ax = Number(seg.a.x);
          const ay = Number(seg.a.y);
          const bx = Number(seg.b.x);
          const by = Number(seg.b.y);
          if (![ax, ay, bx, by].every(Number.isFinite)) {
            continue;
          }

          const type = allowedTypes.has(seg.type) ? seg.type : "wall";
          if (ax === bx && ay === by) {
            continue;
          }

          out.push({
            a: { x: ax, y: ay },
            b: { x: bx, y: by },
            type
          });
        }
        return out;
      };

      let loadedFloors = [];

      if (Array.isArray(data.floors) && data.floors.length > 0) {
        loadedFloors = data.floors.map((floor, index) => createLevel(
          floor && typeof floor.name === "string" && floor.name.trim()
            ? floor.name.trim()
            : buildLevelDefaultName(index),
          sanitizeSegments(floor ? floor.segments : [])
        ));
      } else if (Array.isArray(data.segments)) {
        loadedFloors = [createLevel("Level 1", sanitizeSegments(data.segments))];
      } else {
        throw new Error("Invalid plan file.");
      }

      if (loadedFloors.length === 0) {
        loadedFloors = [createLevel("Level 1", [])];
      }

      floors.length = 0;
      for (let i = 0; i < loadedFloors.length; i += 1) {
        floors.push(loadedFloors[i]);
      }
      rebuildLevelNamesIfDefault();

      const preferredFloorIndex = Number.isInteger(data.currentFloorIndex)
        ? data.currentFloorIndex
        : 0;
      currentLevelIndex = Math.max(0, Math.min(floors.length - 1, preferredFloorIndex));
      segments = floors[currentLevelIndex].segments;
      setPlanTitle(typeof data.title === "string" ? data.title : "Untitled");

      if (data.settings) {
        if (Number.isFinite(Number(data.settings.thickness))) {
          thicknessInput.value = String(data.settings.thickness);
        }
        if (Number.isFinite(Number(data.settings.height))) {
          heightInput.value = String(data.settings.height);
        }
        if (data.settings.joinMode === "miter" || data.settings.joinMode === "bevel") {
          joinModeSelect.value = data.settings.joinMode;
        }
        if (Number.isFinite(Number(data.settings.doorHeight))) {
          doorHeightInput.value = String(data.settings.doorHeight);
        }
        if (Number.isFinite(Number(data.settings.windowGap))) {
          windowGapInput.value = String(data.settings.windowGap);
        }
      }

      if (data.view) {
        if (Number.isFinite(Number(data.view.gridPx))) {
          gridPx = Math.max(MIN_GRID_PX, Math.min(MAX_GRID_PX, Number(data.view.gridPx)));
        }
        if (Number.isFinite(Number(data.view.viewOffsetX))) {
          viewOffsetX = Number(data.view.viewOffsetX);
        }
        if (Number.isFinite(Number(data.view.viewOffsetY))) {
          viewOffsetY = Number(data.view.viewOffsetY);
        }
      }

      selectedSegmentIndices.clear();
      isMarqueeSelecting = false;
      marqueeStartWorld = null;
      marqueeEndWorld = null;
      marqueeMode = "replace";
      dragState = null;
      drawing = false;
      startGrid = null;
      pointerGrid = null;
      renderLevelList();
    }

    function saveProject() {
      const data = serializeProject();
      const text = JSON.stringify(data, null, 2);
      const blob = new Blob([text], { type: "application/json" });
      const now = new Date();
      const { datePart, timePart } = formatDateParts(now);
      const safeTitle = sanitizeFilenamePart(planTitle);
      const filename = `${safeTitle}-${datePart}-${timePart}.json`;
      downloadBlob(blob, filename);
      status.textContent = "Plan saved.";
    }

    function loadProjectFromFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const raw = String(reader.result || "");
          const data = JSON.parse(raw);
          applyProjectData(data);
          undoSnapshot = null;
          redoSnapshot = null;
          setTool("select");
          queueLocalAutosave();
          status.textContent = `Plan loaded. Segments: ${segments.length}`;
          redraw();
        } catch (error) {
          console.error(error);
          status.textContent = "Failed to load plan file.";
        }
      };
      reader.onerror = () => {
        status.textContent = "Failed to read plan file.";
      };
      reader.readAsText(file);
    }

    function vec2(x, z) {
      return { x, z };
    }

    function vec2Add(a, b) {
      return { x: a.x + b.x, z: a.z + b.z };
    }

    function vec2Sub(a, b) {
      return { x: a.x - b.x, z: a.z - b.z };
    }

    function vec2Scale(v, s) {
      return { x: v.x * s, z: v.z * s };
    }

    function vec2Dot(a, b) {
      return a.x * b.x + a.z * b.z;
    }

    function vec2Length(v) {
      return Math.hypot(v.x, v.z);
    }

    function vec2Normalize(v) {
      const len = vec2Length(v);
      if (len < 1e-8) {
        return { x: 0, z: 0 };
      }
      return { x: v.x / len, z: v.z / len };
    }

    function vec2PerpLeft(v) {
      return { x: -v.z, z: v.x };
    }

    function add3(a, b) {
      return [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
    }

    function sub3(a, b) {
      return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
    }

    function dot3(a, b) {
      return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
    }

    function cross3(a, b) {
      return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0]
      ];
    }

    function vertexKey(v) {
      return `${v[0].toFixed(6)},${v[1].toFixed(6)},${v[2].toFixed(6)}`;
    }

    function lineCross2(a, b) {
      return a.x * b.z - a.z * b.x;
    }

    function subtract2(a, b) {
      return { x: a.x - b.x, z: a.z - b.z };
    }

    function segmentIntersectionParams(segA, segB) {
      const eps = 1e-7;
      const p = segA.a;
      const q = segB.a;
      const r = subtract2(segA.b, segA.a);
      const s = subtract2(segB.b, segB.a);
      const rxs = lineCross2(r, s);
      if (Math.abs(rxs) < eps) {
        return null;
      }

      const qp = subtract2(q, p);
      const t = lineCross2(qp, s) / rxs;
      const u = lineCross2(qp, r) / rxs;

      if (t < -eps || t > 1 + eps || u < -eps || u > 1 + eps) {
        return null;
      }

      return {
        t: Math.max(0, Math.min(1, t)),
        u: Math.max(0, Math.min(1, u))
      };
    }

    function endpointParamOnSegment(point, seg) {
      const eps = 1e-6;
      const vx = seg.b.x - seg.a.x;
      const vz = seg.b.z - seg.a.z;
      const lenSq = vx * vx + vz * vz;
      if (lenSq < 1e-12) {
        return null;
      }

      const wx = point.x - seg.a.x;
      const wz = point.z - seg.a.z;
      const t = (wx * vx + wz * vz) / lenSq;
      if (t < -eps || t > 1 + eps) {
        return null;
      }

      const cx = seg.a.x + vx * t;
      const cz = seg.a.z + vz * t;
      const dist = Math.hypot(point.x - cx, point.z - cz);
      if (dist > eps) {
        return null;
      }

      return Math.max(0, Math.min(1, t));
    }

    function addEndpointTouchSplits(segA, segB, splitA, splitB) {
      const endpointsA = [{ point: segA.a, t: 0 }, { point: segA.b, t: 1 }];
      const endpointsB = [{ point: segB.a, t: 0 }, { point: segB.b, t: 1 }];

      for (let i = 0; i < endpointsA.length; i += 1) {
        const hitOnB = endpointParamOnSegment(endpointsA[i].point, segB);
        if (hitOnB !== null) {
          splitA.push(endpointsA[i].t);
          splitB.push(hitOnB);
        }
      }

      for (let i = 0; i < endpointsB.length; i += 1) {
        const hitOnA = endpointParamOnSegment(endpointsB[i].point, segA);
        if (hitOnA !== null) {
          splitB.push(endpointsB[i].t);
          splitA.push(hitOnA);
        }
      }
    }

    function addCollinearOverlapSplits(segA, segB, splitA, splitB) {
      const eps = 1e-7;
      const ax = segA.b.x - segA.a.x;
      const az = segA.b.z - segA.a.z;
      const bx = segB.b.x - segB.a.x;
      const bz = segB.b.z - segB.a.z;
      const lenASq = ax * ax + az * az;
      const lenBSq = bx * bx + bz * bz;

      if (lenASq < 1e-12 || lenBSq < 1e-12) {
        return;
      }

      const crossAB = ax * bz - az * bx;
      if (Math.abs(crossAB) > eps) {
        return;
      }

      const apx = segB.a.x - segA.a.x;
      const apz = segB.a.z - segA.a.z;
      const crossAP = apx * az - apz * ax;
      if (Math.abs(crossAP) > eps) {
        return;
      }

      // Collinear pair: split at overlap boundaries so graph face extraction stays consistent.
      const tB0OnA = ((segB.a.x - segA.a.x) * ax + (segB.a.z - segA.a.z) * az) / lenASq;
      const tB1OnA = ((segB.b.x - segA.a.x) * ax + (segB.b.z - segA.a.z) * az) / lenASq;
      const tA0OnB = ((segA.a.x - segB.a.x) * bx + (segA.a.z - segB.a.z) * bz) / lenBSq;
      const tA1OnB = ((segA.b.x - segB.a.x) * bx + (segA.b.z - segB.a.z) * bz) / lenBSq;

      const overlapMinA = Math.max(0, Math.min(tB0OnA, tB1OnA));
      const overlapMaxA = Math.min(1, Math.max(tB0OnA, tB1OnA));
      const overlapMinB = Math.max(0, Math.min(tA0OnB, tA1OnB));
      const overlapMaxB = Math.min(1, Math.max(tA0OnB, tA1OnB));

      if (overlapMaxA - overlapMinA <= eps || overlapMaxB - overlapMinB <= eps) {
        return;
      }

      splitA.push(Math.max(0, Math.min(1, overlapMinA)));
      splitA.push(Math.max(0, Math.min(1, overlapMaxA)));
      splitB.push(Math.max(0, Math.min(1, overlapMinB)));
      splitB.push(Math.max(0, Math.min(1, overlapMaxB)));
    }

    function splitSegmentsAtIntersections(rawSegments) {
      const splitT = rawSegments.map(() => [0, 1]);

      for (let i = 0; i < rawSegments.length; i += 1) {
        for (let j = i + 1; j < rawSegments.length; j += 1) {
          addEndpointTouchSplits(rawSegments[i], rawSegments[j], splitT[i], splitT[j]);
          addCollinearOverlapSplits(rawSegments[i], rawSegments[j], splitT[i], splitT[j]);

          const hit = segmentIntersectionParams(rawSegments[i], rawSegments[j]);
          if (!hit) {
            continue;
          }
          splitT[i].push(hit.t);
          splitT[j].push(hit.u);
        }
      }

      const result = [];
      const minLen = 1e-5;

      for (let i = 0; i < rawSegments.length; i += 1) {
        const seg = rawSegments[i];
        const r = subtract2(seg.b, seg.a);
        const ts = Array.from(new Set(splitT[i].map(t => t.toFixed(6)))).map(Number).sort((a, b) => a - b);

        for (let k = 0; k < ts.length - 1; k += 1) {
          const t0 = ts[k];
          const t1 = ts[k + 1];
          if (t1 - t0 <= 1e-6) {
            continue;
          }

          const a = { x: seg.a.x + r.x * t0, z: seg.a.z + r.z * t0 };
          const b = { x: seg.a.x + r.x * t1, z: seg.a.z + r.z * t1 };
          const d = subtract2(b, a);
          const len = Math.hypot(d.x, d.z);
          if (len <= minLen) {
            continue;
          }

          result.push({
            a,
            b,
            dir: { x: d.x / len, z: d.z / len },
            type: seg.type || "wall"
          });
        }
      }

      return result;
    }

    function removeOverlappingFaces(mesh) {
      const counts = new Map();
      for (let i = 0; i < mesh.faces.length; i += 1) {
        const face = mesh.faces[i];
        const key = [...face].sort((a, b) => a - b).join(",");
        counts.set(key, (counts.get(key) || 0) + 1);
      }

      const nextFaces = [];
      const nextGroups = [];
      for (let i = 0; i < mesh.faces.length; i += 1) {
        const face = mesh.faces[i];
        const key = [...face].sort((a, b) => a - b).join(",");
        if (counts.get(key) === 1) {
          nextFaces.push(face);
          nextGroups.push(mesh.faceGroups[i]);
        }
      }

      mesh.faces = nextFaces;
      mesh.faceGroups = nextGroups;
    }

    function polygonSignedAreaXZ(points) {
      let area = 0;
      for (let i = 0; i < points.length; i += 1) {
        const a = points[i];
        const b = points[(i + 1) % points.length];
        area += a.x * b.z - b.x * a.z;
      }
      return area * 0.5;
    }

    function extractBoundedFacesFromSegments(worldSegments) {
      const nodeIndex = new Map();
      const nodes = [];
      const edges = new Set();

      function pointKey(p) {
        return `${p.x.toFixed(6)},${p.z.toFixed(6)}`;
      }

      function getNodeId(p) {
        const key = pointKey(p);
        if (!nodeIndex.has(key)) {
          nodeIndex.set(key, nodes.length);
          nodes.push({ x: p.x, z: p.z, neighbors: [] });
        }
        return nodeIndex.get(key);
      }

      for (let i = 0; i < worldSegments.length; i += 1) {
        const seg = worldSegments[i];
        const a = getNodeId(seg.a);
        const b = getNodeId(seg.b);
        if (a === b) {
          continue;
        }

        const k = a < b ? `${a}|${b}` : `${b}|${a}`;
        if (edges.has(k)) {
          continue;
        }
        edges.add(k);
        nodes[a].neighbors.push(b);
        nodes[b].neighbors.push(a);
      }

      for (let i = 0; i < nodes.length; i += 1) {
        const center = nodes[i];
        nodes[i].neighbors.sort((ia, ib) => {
          const a = nodes[ia];
          const b = nodes[ib];
          const aa = Math.atan2(a.z - center.z, a.x - center.x);
          const ab = Math.atan2(b.z - center.z, b.x - center.x);
          return aa - ab;
        });
      }

      const visited = new Set();
      const faces = [];

      function edgeKey(a, b) {
        return `${a}>${b}`;
      }

      for (let startA = 0; startA < nodes.length; startA += 1) {
        const neigh = nodes[startA].neighbors;
        for (let ni = 0; ni < neigh.length; ni += 1) {
          const startB = neigh[ni];
          const firstKey = edgeKey(startA, startB);
          if (visited.has(firstKey)) {
            continue;
          }

          const cycle = [];
          let a = startA;
          let b = startB;
          let guard = 0;

          while (guard < 5000) {
            guard += 1;
            visited.add(edgeKey(a, b));
            cycle.push({ x: nodes[a].x, z: nodes[a].z });

            const list = nodes[b].neighbors;
            const idx = list.indexOf(a);
            if (idx < 0) {
              break;
            }
            const next = list[(idx - 1 + list.length) % list.length];

            a = b;
            b = next;

            if (a === startA && b === startB) {
              break;
            }
          }

          if (cycle.length >= 3) {
            const area = polygonSignedAreaXZ(cycle);
            if (Math.abs(area) > 1e-8) {
              faces.push({ points: cycle, area });
            }
          }
        }
      }

      if (faces.length === 0) {
        return [];
      }

      let outerIndex = 0;
      let outerAreaAbs = Math.abs(faces[0].area);
      for (let i = 1; i < faces.length; i += 1) {
        const absArea = Math.abs(faces[i].area);
        if (absArea > outerAreaAbs) {
          outerAreaAbs = absArea;
          outerIndex = i;
        }
      }

      const bounded = [];
      for (let i = 0; i < faces.length; i += 1) {
        if (i === outerIndex) {
          continue;
        }
        bounded.push(faces[i].points);
      }

      // When there is only one valid closed loop, it is the interior we need
      // for slab generation. Keep it instead of returning an empty set.
      if (bounded.length === 0 && faces.length === 1) {
        return [faces[0].points];
      }

      return bounded;
    }

    function pointInTriangle2D(p, a, b, c) {
      const v0 = { x: c.x - a.x, z: c.z - a.z };
      const v1 = { x: b.x - a.x, z: b.z - a.z };
      const v2 = { x: p.x - a.x, z: p.z - a.z };

      const dot00 = v0.x * v0.x + v0.z * v0.z;
      const dot01 = v0.x * v1.x + v0.z * v1.z;
      const dot02 = v0.x * v2.x + v0.z * v2.z;
      const dot11 = v1.x * v1.x + v1.z * v1.z;
      const dot12 = v1.x * v2.x + v1.z * v2.z;

      const denom = dot00 * dot11 - dot01 * dot01;
      if (Math.abs(denom) < 1e-12) {
        return false;
      }

      const inv = 1 / denom;
      const u = (dot11 * dot02 - dot01 * dot12) * inv;
      const v = (dot00 * dot12 - dot01 * dot02) * inv;
      return u >= -1e-8 && v >= -1e-8 && (u + v) <= 1 + 1e-8;
    }

    function triangulatePolygonXZ(points) {
      if (points.length < 3) {
        return [];
      }

      const area = polygonSignedAreaXZ(points);
      const poly = area >= 0 ? points.slice() : points.slice().reverse();
      const indices = poly.map((_, i) => i);
      const tris = [];

      let guard = 0;
      while (indices.length > 2 && guard < 10000) {
        guard += 1;
        let earFound = false;

        for (let i = 0; i < indices.length; i += 1) {
          const i0 = indices[(i - 1 + indices.length) % indices.length];
